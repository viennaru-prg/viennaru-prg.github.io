<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>내 홈페이지 — 자율 개발 갤러리</title>
<meta name="description" content="CLAUDE.md 규칙으로 회차마다 만들어지는 프로젝트 갤러리" />
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --panel2: #1c2230; --text: #e6edf3;
    --muted: #8b949e; --accent: #58a6ff; --border: #30363d;
    --good: #3fb950; --gold: #e3b341;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.65;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; }
  .wrap { max-width: 1040px; margin: 0 auto; padding: 0 22px; }

  header {
    padding: 64px 0 40px;
    background: radial-gradient(circle at 85% 10%, rgba(88,166,255,0.13), transparent 55%);
  }
  .badge {
    display: inline-block; font-size: 12.5px; color: var(--accent);
    border: 1px solid var(--border); border-radius: 999px;
    padding: 5px 13px; margin-bottom: 18px;
  }
  h1 { font-size: clamp(30px, 5vw, 46px); line-height: 1.15; letter-spacing: -1px; }
  h1 .grad {
    background: linear-gradient(90deg, #58a6ff, #a371f7);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .lead { color: var(--muted); font-size: 16px; margin-top: 14px; max-width: 600px; }

  /* sticky toolbar: scannable when many projects */
  .toolbar {
    position: sticky; top: 0; z-index: 20;
    background: rgba(13,17,23,0.92); backdrop-filter: blur(6px);
    border-bottom: 1px solid var(--border);
  }
  .toolbar .wrap {
    display: flex; align-items: center; gap: 14px;
    padding-top: 12px; padding-bottom: 12px; flex-wrap: wrap;
  }
  .stat { font-size: 13px; color: var(--muted); }
  .stat b { color: var(--text); }
  .grow { flex: 1; }
  .search {
    background: var(--panel); border: 1px solid var(--border);
    color: var(--text); border-radius: 9px; padding: 8px 12px;
    font: inherit; font-size: 14px; min-width: 180px;
  }
  .search:focus { outline: 1px solid var(--accent); }
  .seg { display: flex; border: 1px solid var(--border); border-radius: 9px; overflow: hidden; }
  .seg button {
    background: transparent; color: var(--muted); border: none;
    padding: 8px 12px; font: inherit; font-size: 13px; cursor: pointer;
  }
  .seg button.on { background: var(--panel); color: var(--text); }

  main { padding: 28px 0 70px; }
  .grid {
    display: grid; gap: 16px;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  }
  .card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 14px; padding: 18px; display: flex; flex-direction: column;
    transition: border-color .15s, transform .15s;
  }
  .card:hover { border-color: #3d4350; transform: translateY(-2px); }
  .card .top { display: flex; align-items: center; gap: 10px; }
  .num {
    font-size: 12px; font-weight: 700; color: var(--accent);
    background: rgba(88,166,255,0.13); border-radius: 7px;
    padding: 3px 8px; letter-spacing: .5px;
  }
  .card h3 { font-size: 18px; flex: 1; }
  .chip {
    font-size: 11.5px; font-weight: 700; padding: 3px 9px; border-radius: 999px;
    border: 1px solid var(--border); color: var(--muted); white-space: nowrap;
  }
  .chip.done { color: var(--good); border-color: rgba(63,185,80,.4); }
  .card .desc {
    color: var(--muted); font-size: 13.5px; margin: 10px 0 14px; flex: 1;
  }
  .actions { display: flex; gap: 8px; }
  .mini {
    font-size: 13px; font-weight: 600; padding: 9px 14px; border-radius: 9px;
    cursor: pointer; border: 1px solid var(--border); background: transparent;
    color: var(--text); text-decoration: none; text-align: center;
  }
  .mini.primary { background: var(--accent); color: #0d1117; border-color: var(--accent); }
  .mini.grow { flex: 1; }
  .mini:disabled { opacity: .4; cursor: not-allowed; }

  .review {
    display: none; margin-top: 14px; border-top: 1px dashed var(--border);
    padding-top: 14px;
  }
  .review.open { display: block; }
  .q { font-size: 13.5px; font-weight: 600; margin-bottom: 9px; }
  .stars { display: flex; gap: 4px; margin-bottom: 9px; font-size: 23px; cursor: pointer; }
  .stars span { color: #444c56; }
  .stars span.on, .stars span.hover { color: var(--gold); }
  .stars.ro { cursor: default; font-size: 17px; }
  textarea {
    width: 100%; min-height: 74px; resize: vertical; background: #0d1117;
    color: var(--text); border: 1px solid var(--border); border-radius: 9px;
    padding: 10px 12px; font: inherit; font-size: 13.5px;
  }
  textarea:focus { outline: 1px solid var(--accent); }
  .row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 9px; }
  .done-line {
    display: inline-flex; align-items: center; gap: 6px; color: var(--good);
    font-size: 12.5px; font-weight: 700; margin-bottom: 8px;
  }
  .saved-text {
    background: #0d1117; border: 1px solid var(--border); border-radius: 9px;
    padding: 10px 12px; font-size: 13.5px; white-space: pre-wrap; margin: 8px 0;
  }
  details.hist { margin-top: 10px; }
  details.hist summary { color: var(--muted); font-size: 12.5px; cursor: pointer; }
  .hist .item {
    border-left: 2px solid var(--border); padding: 5px 0 5px 10px;
    margin-top: 8px; font-size: 12.5px; color: var(--muted);
  }
  .hint { color: var(--muted); font-size: 11.5px; margin-top: 7px; }
  .empty { color: var(--muted); font-size: 14px; padding: 30px 0; text-align: center; }

  footer {
    padding: 34px 0; color: var(--muted); font-size: 12.5px;
    text-align: center; border-top: 1px solid var(--border);
  }
  footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>

  <header>
    <div class="wrap">
      <span class="badge">● 자율 개발 갤러리</span>
      <h1><span class="grad">프로젝트 갤러리</span></h1>
      <p class="lead">
        CLAUDE.md 규칙 안에서 회차마다 만들어지는 결과물입니다.
        카드를 눌러 실행하고, 별점·후기를 남기면 다음 회차에 반영됩니다.
      </p>
    </div>
  </header>

  <div class="toolbar">
    <div class="wrap">
      <div class="stat" id="stat"></div>
      <div class="grow"></div>
      <input class="search" id="search" type="search" placeholder="프로젝트 검색…" />
      <div class="seg" id="seg">
        <button data-f="all" class="on">전체</button>
        <button data-f="todo">후기 미작성</button>
        <button data-f="done">후기 완료</button>
      </div>
    </div>
  </div>

  <main>
    <div class="wrap">
      <div class="grid" id="grid"></div>
      <div class="empty" id="empty" style="display:none">조건에 맞는 프로젝트가 없습니다.</div>
    </div>
  </main>

  <footer>
    © <span id="year"></span> · 자율 개발 프로젝트 ·
    <a href="https://github.com/viennaru-prg/viennaru-prg.github.io" target="_blank" rel="noopener">소스</a>
  </footer>

<script>
"use strict";
(function () {
  // ---- project registry (자율 루프가 새 회차마다 맨 앞에 추가) ----
  var PROJECTS = [
    {
      id: "p6", n: 6, title: "ORBITAL", emoji: "🪐",
      url: "projects/p6/index.html",
      desc: "코어 메커니즘 전환 — 실시간 회피가 아닌 결정론적 중력 궤도 조준. 드래그로 발사해 행성 중력을 타고 포탈 명중. 영역·네임드 보스·승천 메타. 같은 조준=같은 결과(운 0% 코어).",
      build: { design: 14, dev: 80, test: 29, docs: 9, total: 132 }
    },
    {
      id: "p5", n: 5, title: "AURORA", emoji: "✦",
      url: "projects/p5/index.html",
      desc: "대형 여정형 생존. 5개 영역·네임드 보스·빛조각 수집 + 런 간 영구 성장(승천)·절차적 사운드·연출. 실력 ~95%, 운 ~5%.",
      build: { design: 9, dev: 48, test: 18, docs: 7, total: 82 }
    },
    {
      id: "p4", n: 4, title: "PARRY", emoji: "🛡️",
      url: "projects/p4/index.html",
      desc: "예고된 방향에서 날아오는 타격을 닿는 순간 막는 타이밍 방어 게임. 차분한 화면 · 스테이지/중간보스/보스 · 무작위 강화. 실력 ~95%, 운 ~5%.",
      build: { design: 6, dev: 24, test: 11, docs: 3, total: 44 }
    },
    {
      id: "p3", n: 3, title: "ECHO", emoji: "🌀",
      url: "projects/p3/index.html",
      desc: "원형 아레나 정밀 생존. 예고된 틈으로 빠져나가며 스테이지·중간보스·보스 돌파. 매번 다른 무작위 업그레이드·보호막. 실력 ~95%, 운 ~5%.",
      build: { design: 7, dev: 33, test: 14, docs: 4, total: 58 }
    },
    {
      id: "p2", n: 2, title: "WEAVE", emoji: "🧵",
      url: "projects/p2/index.html",
      desc: "문의 빈틈을 통과하는 정밀 컨트롤 게임. 스테이지·중간보스·보스 기믹. 모든 문이 예고되고 완벽 플레이면 반드시 통과 — 운 0%, 실력으로만.",
      build: { design: 4, dev: 13, test: 6, docs: 2, total: 25 }
    },
    {
      id: "p1", n: 1, title: "ORBIT", emoji: "🎮",
      url: "projects/p1/index.html",
      desc: "원버튼 반응 게임. 탭으로 회전 방향을 반전해 파란 점을 먹고 빨간 호를 피하는 1분 몰입형.",
      build: { design: 3, dev: 9, test: 3, docs: 1, total: 16 }
    }
  ];

  var STORE_KEY = "orbit_reviews_v1";

  function loadAll() {
    try { return JSON.parse(window.localStorage.getItem(STORE_KEY)) || {}; }
    catch (e) { return {}; }
  }
  function saveAll(o) {
    try { window.localStorage.setItem(STORE_KEY, JSON.stringify(o)); } catch (e) {}
  }
  function getReview(id) { return loadAll()[id] || null; }
  function putReview(id, rating, text) {
    var all = loadAll(), prev = all[id];
    var hist = (prev && prev.history) ? prev.history.slice() : [];
    if (prev && (prev.rating !== rating || prev.text !== text)) {
      hist.push({ rating: prev.rating, text: prev.text, savedAt: prev.savedAt });
    }
    all[id] = { rating: rating, text: text,
      savedAt: new Date().toISOString().slice(0, 10), history: hist };
    saveAll(all);
    return all[id];
  }
  function buildClaudeMessage(p, r) {
    return "[후기] 프로젝트 " + p.n + " " + p.title +
      " · 별점 " + r.rating + "/5 · " + r.savedAt + "\n" + r.text;
  }
  window.__HOME__ = {
    getReview: getReview, putReview: putReview,
    buildClaudeMessage: buildClaudeMessage,
    _setStore: function (k) { STORE_KEY = k; }
  };

  // ---- rendering ----
  function el(tag, cls, html) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    if (html != null) e.innerHTML = html;
    return e;
  }
  function esc(s) {
    return String(s).replace(/[&<>]/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c];
    });
  }
  function pad(n) { return n < 10 ? "0" + n : "" + n; }
  function starsHtml(n, ro) {
    var s = '<div class="stars' + (ro ? ' ro' : '') + '">';
    for (var i = 1; i <= 5; i++)
      s += '<span data-v="' + i + '"' + (i <= n ? ' class="on"' : '') + '>★</span>';
    return s + '</div>';
  }

  var grid = document.getElementById("grid");
  var emptyEl = document.getElementById("empty");
  var statEl = document.getElementById("stat");
  var searchEl = document.getElementById("search");
  var filter = "all", query = "";

  function refreshStat() {
    var done = 0;
    PROJECTS.forEach(function (p) { if (getReview(p.id)) done++; });
    statEl.innerHTML = "프로젝트 <b>" + PROJECTS.length + "</b>개 · 후기 <b>" +
      done + "</b>개 작성 완료";
  }

  function makeCard(p) {
    var saved = getReview(p.id);
    var card = el("div", "card");

    var top = el("div", "top");
    top.appendChild(el("span", "num", "No." + pad(p.n)));
    top.appendChild(el("h3", null, esc(p.title) + " " + p.emoji));
    top.appendChild(el("span", "chip" + (saved ? " done" : ""),
      saved ? "✅ 후기 작성됨" : "✍️ 후기 미작성"));
    card.appendChild(top);

    card.appendChild(el("div", "desc", esc(p.desc)));

    var actions = el("div", "actions");
    var play = el("a", "mini primary grow", "▶ 플레이");
    play.href = p.url;
    var toggle = el("button", "mini grow", saved ? "후기 보기/수정" : "후기 쓰기");
    actions.appendChild(play);
    actions.appendChild(toggle);
    card.appendChild(actions);

    if (p.build) {
      var b = p.build;
      var bd = el("details", "hist");
      bd.innerHTML = "<summary>🔧 제작 토큰(추정) · 합계 ~" + b.total +
        "k</summary><div class='item'>설계 ~" + b.design + "k · 개발 ~" +
        b.dev + "k · 테스트 ~" + b.test + "k · 문서 ~" + b.docs + "k" +
        "<br>※ 정확 계측이 아닌 추정치입니다.</div>";
      bd.style.marginTop = "12px";
      card.appendChild(bd);
    }

    var rv = el("div", "review");
    card.appendChild(rv);
    toggle.onclick = function () {
      if (rv.className.indexOf("open") > -1) { rv.className = "review"; }
      else { rv.className = "review open"; paintReview(rv, p); }
    };

    card._match = (p.title + " " + p.desc + " " + p.n).toLowerCase();
    card._hasReview = !!saved;
    return card;
  }

  function paintReview(rv, p) {
    rv.innerHTML = "";
    var saved = getReview(p.id);

    if (saved && !rv._editing) {
      rv.appendChild(el("div", "done-line", "✅ 작성함 · " + saved.savedAt));
      rv.insertAdjacentHTML("beforeend", starsHtml(saved.rating, true));
      rv.appendChild(el("div", "saved-text", esc(saved.text)));

      var row = el("div", "row");
      var edit = el("button", "mini", "수정");
      var copy = el("button", "mini", "📋 복사해서 채팅에 붙여넣기");
      row.appendChild(edit); row.appendChild(copy);
      rv.appendChild(row);
      rv.appendChild(el("div", "hint",
        "이 후기는 본인 기록용입니다. 다음 프로젝트에 반영하려면 채팅창에 적어주세요 " +
        "— 위 ‘복사’로 그대로 붙여넣어도 됩니다."));

      if (saved.history && saved.history.length) {
        var d = el("details", "hist");
        d.innerHTML = "<summary>이전에 이렇게 쓰셨어요 (" +
          saved.history.length + "개)</summary>";
        saved.history.slice().reverse().forEach(function (h) {
          d.appendChild(el("div", "item",
            "★".repeat(h.rating) + " · " + (h.savedAt || "") + "<br>" + esc(h.text)));
        });
        rv.appendChild(d);
      }

      edit.onclick = function () { rv._editing = true; paintReview(rv, p); };
      copy.onclick = function () {
        var msg = buildClaudeMessage(p, saved);
        copyText(msg, function (ok) {
          copy.textContent = ok ? "복사됨 ✓ 채팅에 붙여넣기" : "복사 실패";
          if (!ok) { var t = el("textarea"); t.value = msg; rv.appendChild(t); t.select(); }
          setTimeout(function () { copy.textContent = "📋 복사해서 채팅에 붙여넣기"; }, 4000);
        });
      };
      return;
    }

    rv._editing = false;
    rv.appendChild(el("div", "q", "이 프로젝트, 어땠어요?"));
    rv.insertAdjacentHTML("beforeend", starsHtml(saved ? saved.rating : 0, false));
    var ta = el("textarea");
    ta.placeholder = "좋았던 점 / 아쉬운 점 / 다음엔 이런 게 있으면…";
    ta.value = saved ? saved.text : "";
    rv.appendChild(ta);

    var row = el("div", "row");
    var save = el("button", "mini primary", "저장");
    row.appendChild(save);
    if (saved) {
      var cancel = el("button", "mini", "취소");
      row.appendChild(cancel);
      cancel.onclick = function () { paintReview(rv, p); };
    }
    rv.appendChild(row);

    var picked = saved ? saved.rating : 0;
    var wrap = rv.querySelector(".stars");
    var spans = wrap.querySelectorAll("span");
    function refresh() {
      for (var i = 0; i < spans.length; i++)
        spans[i].className = (i < picked) ? "on" : "";
    }
    spans.forEach(function (sp, idx) {
      sp.onmouseenter = function () {
        for (var i = 0; i < spans.length; i++)
          spans[i].className = (i <= idx) ? "hover" : "";
      };
      sp.onclick = function () { picked = idx + 1; refresh(); };
    });
    wrap.onmouseleave = refresh;

    save.onclick = function () {
      var text = ta.value.trim();
      if (!picked && !text) { ta.focus(); return; }
      putReview(p.id, picked || 0, text);
      paintReview(rv, p); refreshStat(); rerender();
    };
  }

  function copyText(t, cb) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(t).then(function () { cb(true); },
        function () { cb(false); });
    } else { cb(false); }
  }

  function rerender() {
    grid.innerHTML = "";
    var shown = 0;
    PROJECTS.forEach(function (p) {
      var saved = getReview(p.id);
      if (filter === "done" && !saved) return;
      if (filter === "todo" && saved) return;
      if (query && (p.title + " " + p.desc + " " + p.n)
          .toLowerCase().indexOf(query) === -1) return;
      grid.appendChild(makeCard(p));
      shown++;
    });
    emptyEl.style.display = shown ? "none" : "block";
  }

  var seg = document.getElementById("seg");
  seg.querySelectorAll("button").forEach(function (b) {
    b.onclick = function () {
      seg.querySelectorAll("button").forEach(function (x) { x.className = ""; });
      b.className = "on";
      filter = b.getAttribute("data-f");
      rerender();
    };
  });
  searchEl.oninput = function () {
    query = searchEl.value.trim().toLowerCase();
    rerender();
  };

  refreshStat();
  rerender();
  document.getElementById("year").textContent = new Date().getFullYear();
})();
</script>
</body>
</html>
