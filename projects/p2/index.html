<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>WEAVE — 프로젝트 2</title>
<style>
  html, body {
    margin: 0; height: 100%; overflow: hidden; background: #0d1117;
    font-family: -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
    -webkit-tap-highlight-color: transparent; user-select: none;
  }
  #c { display: block; touch-action: none; }
  .layer {
    position: fixed; inset: 0; pointer-events: none; display: flex;
    flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; color: #e6edf3; text-align: center; padding: 24px; box-sizing: border-box;
  }
  .hud { justify-content: flex-start; padding-top: 24px; }
  .hud .score { font-size: 46px; font-weight: 800; letter-spacing: -1px; }
  .hud .meta { font-size: 13px; color: #8b949e; margin-top: 2px; }
  .hud .combo { font-size: 15px; color: #3fb950; font-weight: 700; margin-top: 4px; height: 18px; }
  h1 {
    font-size: clamp(40px, 12vw, 84px); margin: 0; letter-spacing: 6px;
    background: linear-gradient(90deg, #58a6ff, #3fb950);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .layer p { color: #8b949e; margin: 0; font-size: 16px; max-width: 460px; }
  .big { font-size: 30px; color: #e6edf3; font-weight: 700; }
  .tap { margin-top: 10px; font-size: 14px; color: #58a6ff; animation: blink 1.1s infinite; }
  @keyframes blink { 50% { opacity: .35; } }
  .home {
    position: fixed; left: 16px; bottom: 14px; font-size: 13px;
    color: #8b949e; text-decoration: none; z-index: 9; pointer-events: auto;
  }
  .home:hover { color: #58a6ff; }
  .hidden { display: none !important; }
</style>
</head>
<body>
  <canvas id="c"></canvas>

  <div class="layer hud hidden" id="hud">
    <div class="score" id="score">0</div>
    <div class="meta" id="meta"></div>
    <div class="combo" id="combo"></div>
  </div>

  <div class="layer" id="startScreen">
    <h1>WEAVE</h1>
    <p>마우스/손가락으로 좌우 이동 (← → 키도 가능)</p>
    <p>문의 빈틈을 통과하세요. 모든 문은 미리 보이고, 빠르고 정확하게만
       움직이면 <b>반드시 통과 가능</b>합니다 — 운은 없습니다.</p>
    <div class="tap">화면을 탭하면 시작</div>
  </div>

  <div class="layer hidden" id="overScreen">
    <h1>GAME OVER</h1>
    <div class="big" id="finalScore">0</div>
    <p id="bestMsg"></p>
    <div class="tap" id="retryHint">잠시 후 다시 도전</div>
  </div>

  <a class="home" href="../../index.html">← 홈으로</a>

<script>
"use strict";
(function () {
  var canvas = document.getElementById("c");
  var ctx = canvas.getContext("2d");
  var scoreEl = document.getElementById("score");
  var metaEl = document.getElementById("meta");
  var comboEl = document.getElementById("combo");
  var hud = document.getElementById("hud");
  var startScreen = document.getElementById("startScreen");
  var overScreen = document.getElementById("overScreen");
  var finalScore = document.getElementById("finalScore");
  var bestMsg = document.getElementById("bestMsg");

  var W, H;
  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener("resize", resize);
  resize();

  var best = 0;
  try { best = parseInt(window.localStorage.getItem("weave_best"), 10) || 0; } catch (e) {}

  // --- tuning ---
  var PW = 30;          // player half-width (visual ~ collision)
  var GATE_GAP = 220;   // constant vertical distance between gates (px)
  var VMAX = 11;        // player max horizontal px/frame (defines reachability)
  var SAFE = 0.82;      // fraction of theoretical reach used -> always fair

  var G = {
    screen: "start",
    px: 0, targetX: 0,
    gates: [], particles: [],
    speed: 4.0, gapW: 200,
    score: 0, combo: 0, bestCombo: 0,
    shake: 0, overAt: 0, moveDir: 0
  };

  function playerY() { return H - 90; }
  function level() { return Math.floor(G.score / 5); }
  function speedFor(lv) { return 4.0 + lv * 0.5; }
  function gapForLevel(lv) { return Math.max(96, 200 - lv * 9); }

  // horizontal distance the player can cover between two consecutive gates.
  // gate travels GATE_GAP px at G.speed -> GATE_GAP/speed frames available.
  function maxTravel() { return VMAX * (GATE_GAP / G.speed); }
  function reach() { return maxTravel() * SAFE; }

  // next gap center: random but CONSTRAINED so a perfect player can always
  // get there from the previous center -> outcome is skill, never luck.
  function nextCenter(prev) {
    var r = reach();
    var lo = Math.max(G.gapW / 2 + 8, prev - r);
    var hi = Math.min(W - G.gapW / 2 - 8, prev + r);
    if (hi < lo) { var m = (lo + hi) / 2; lo = m; hi = m; }
    return lo + Math.random() * (hi - lo);
  }

  function spawnGate(y) {
    var prev = G.gates.length ? G.gates[G.gates.length - 1].cx : G.px;
    G.gates.push({ y: y, cx: nextCenter(prev), w: G.gapW, scored: false });
  }

  function reset() {
    G.screen = "playing";
    G.px = W / 2; G.targetX = W / 2;
    G.gates = []; G.particles = [];
    G.score = 0; G.combo = 0; G.bestCombo = 0;
    G.speed = speedFor(0); G.gapW = gapForLevel(0);
    G.shake = 0; G.moveDir = 0;
    var y = -40;
    for (var i = 0; i < 4; i++) { spawnGate(y); y -= GATE_GAP; }
    paintHud();
    hud.classList.remove("hidden");
    startScreen.classList.add("hidden");
    overScreen.classList.add("hidden");
  }

  function paintHud() {
    scoreEl.textContent = G.score;
    metaEl.textContent = (best ? "BEST " + best + "  ·  " : "") + "LV " + (level() + 1);
    comboEl.textContent = G.combo >= 2 ? "PERFECT x" + G.combo : "";
  }

  function clampX(x) { return Math.max(PW, Math.min(x, W - PW)); }

  function addParticles(x, y, color, n) {
    for (var i = 0; i < n; i++) {
      var a = Math.random() * Math.PI * 2, s = 1 + Math.random() * 4;
      G.particles.push({ x: x, y: y, vx: Math.cos(a) * s, vy: Math.sin(a) * s,
        life: 1, color: color });
    }
  }

  function gameOver(gx) {
    G.screen = "over";
    G.overAt = Date.now();
    G.shake = 22;
    addParticles(G.px, playerY(), "#ff5d5d", 44);
    var isNew = G.score > best;
    if (isNew) {
      best = G.score;
      try { window.localStorage.setItem("weave_best", String(best)); } catch (e) {}
    }
    setTimeout(function () {
      if (G.screen !== "over") return;
      finalScore.textContent = G.score;
      bestMsg.textContent = (isNew ? "🎉 신기록!  " : "BEST " + best + "  ") +
        "· 최고 PERFECT x" + G.bestCombo;
      hud.classList.add("hidden");
      overScreen.classList.remove("hidden");
    }, 650);
  }

  function handleInput() {
    if (G.screen === "start") reset();
    else if (G.screen === "over") { if (Date.now() - G.overAt > 700) reset(); }
  }
  window.addEventListener("pointerdown", function (e) {
    if (e.target && e.target.classList && e.target.classList.contains("home")) return;
    e.preventDefault();
    if (G.screen === "playing") G.targetX = clampX(e.clientX);
    else handleInput();
  }, { passive: false });
  window.addEventListener("pointermove", function (e) {
    if (G.screen === "playing") G.targetX = clampX(e.clientX);
  });
  window.addEventListener("keydown", function (e) {
    if (e.code === "ArrowLeft") G.moveDir = -1;
    else if (e.code === "ArrowRight") G.moveDir = 1;
    else if (e.code === "Space" || e.code === "Enter" || e.code === "ArrowUp") {
      e.preventDefault(); handleInput();
    }
  });
  window.addEventListener("keyup", function (e) {
    if ((e.code === "ArrowLeft" && G.moveDir === -1) ||
        (e.code === "ArrowRight" && G.moveDir === 1)) G.moveDir = 0;
  });

  function update() {
    if (G.screen === "playing") {
      // player moves toward target, capped at VMAX (defines reachability)
      if (G.moveDir) {
        G.px = clampX(G.px + G.moveDir * VMAX);
        G.targetX = G.px;
      } else {
        var d = G.targetX - G.px;
        if (Math.abs(d) <= VMAX) G.px = G.targetX;
        else G.px += (d > 0 ? VMAX : -VMAX);
        G.px = clampX(G.px);
      }

      for (var i = 0; i < G.gates.length; i++) {
        var g = G.gates[i];
        g.y += G.speed;
        if (!g.scored && g.y >= playerY()) {
          g.scored = true;
          var off = Math.abs(G.px - g.cx);
          if (off > g.w / 2) { gameOver(g.cx); return; }
          G.score++;
          var perfect = off < g.w * 0.16;
          if (perfect) {
            G.combo++;
            if (G.combo > G.bestCombo) G.bestCombo = G.combo;
          } else G.combo = 0;
          addParticles(G.px, playerY(), perfect ? "#3fb950" : "#58a6ff",
            perfect ? 20 : 10);
          G.shake = Math.max(G.shake, perfect ? 6 : 3);
          // difficulty: only precision/speed demand rises, never randomness
          G.speed = speedFor(level());
          G.gapW = gapForLevel(level());
          paintHud();
        }
      }
      // keep constant vertical spacing; recycle off-screen gates
      var keep = [];
      for (var k = 0; k < G.gates.length; k++)
        if (G.gates[k].y < H + 40) keep.push(G.gates[k]);
      G.gates = keep;
      var topY = G.gates.length ? G.gates[G.gates.length - 1].y : playerY();
      while (topY > -GATE_GAP) { topY -= GATE_GAP; spawnGate(topY); }
    }

    var pk = [];
    for (var q = 0; q < G.particles.length; q++) {
      var p = G.particles[q];
      p.x += p.vx; p.y += p.vy; p.vx *= 0.95; p.vy *= 0.95; p.life -= 0.025;
      if (p.life > 0) pk.push(p);
    }
    G.particles = pk;
    if (G.shake > 0.4) G.shake *= 0.86; else G.shake = 0;
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.save();
    if (G.shake > 0.4)
      ctx.translate((Math.random() - 0.5) * G.shake, (Math.random() - 0.5) * G.shake);

    if (G.screen === "playing" || G.screen === "over") {
      for (var i = 0; i < G.gates.length; i++) {
        var g = G.gates[i];
        ctx.fillStyle = g.scored ? "rgba(63,185,80,0.18)" : "rgba(88,166,255,0.30)";
        ctx.fillRect(0, g.y - 5, g.cx - g.w / 2, 10);
        ctx.fillRect(g.cx + g.w / 2, g.y - 5, W - (g.cx + g.w / 2), 10);
        // gap edge markers (telegraph)
        ctx.fillStyle = g.scored ? "#3fb950" : "#58a6ff";
        ctx.fillRect(g.cx - g.w / 2 - 3, g.y - 7, 3, 14);
        ctx.fillRect(g.cx + g.w / 2, g.y - 7, 3, 14);
      }
      var py = playerY();
      ctx.fillStyle = "#fff";
      ctx.shadowColor = "#fff"; ctx.shadowBlur = 16;
      ctx.beginPath();
      ctx.arc(G.px, py, PW * 0.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    for (var q = 0; q < G.particles.length; q++) {
      var pt = G.particles[q];
      ctx.globalAlpha = pt.life > 0 ? pt.life : 0;
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, 3 * pt.life + 1, 0, Math.PI * 2);
      ctx.fillStyle = pt.color; ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  function loop() { update(); draw(); window.requestAnimationFrame(loop); }

  window.__WEAVE__ = {
    G: G, update: update, handleInput: handleInput, reset: reset,
    level: level, speedFor: speedFor, gapForLevel: gapForLevel,
    maxTravel: maxTravel, reach: reach, nextCenter: nextCenter,
    consts: { PW: PW, GATE_GAP: GATE_GAP, VMAX: VMAX, SAFE: SAFE }
  };

  loop();
})();
</script>
</body>
</html>
