<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>PIXEL FALL — 프로젝트 2</title>
<style>
  html, body {
    margin: 0; height: 100%; overflow: hidden; background: #0d1117;
    font-family: -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
    -webkit-tap-highlight-color: transparent; user-select: none;
  }
  #c { display: block; touch-action: none; }
  .layer {
    position: fixed; inset: 0; pointer-events: none; display: flex;
    flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; color: #e6edf3; text-align: center; padding: 24px; box-sizing: border-box;
  }
  .hud { justify-content: flex-start; padding-top: 24px; }
  .hud .score { font-size: 44px; font-weight: 800; letter-spacing: -1px; }
  .hud .meta { font-size: 13px; color: #8b949e; margin-top: 2px; }
  .hud .combo { font-size: 15px; color: #e3b341; font-weight: 700; margin-top: 4px; height: 18px; }
  h1 {
    font-size: clamp(38px, 11vw, 80px); margin: 0; letter-spacing: 3px;
    background: linear-gradient(90deg, #58a6ff, #3fb950);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .layer p { color: #8b949e; margin: 0; font-size: 16px; }
  .big { font-size: 30px; color: #e6edf3; font-weight: 700; }
  .tap { margin-top: 10px; font-size: 14px; color: #58a6ff; animation: blink 1.1s infinite; }
  @keyframes blink { 50% { opacity: .35; } }
  .home {
    position: fixed; left: 16px; bottom: 14px; font-size: 13px;
    color: #8b949e; text-decoration: none; z-index: 9; pointer-events: auto;
  }
  .home:hover { color: #58a6ff; }
  .hidden { display: none !important; }
</style>
</head>
<body>
  <canvas id="c"></canvas>

  <div class="layer hud hidden" id="hud">
    <div class="score" id="score">0</div>
    <div class="meta" id="meta"></div>
    <div class="combo" id="combo"></div>
  </div>

  <div class="layer" id="startScreen">
    <h1>PIXEL FALL</h1>
    <p>마우스/손가락으로 좌우 이동 (← → 키도 가능)</p>
    <p>노란 코인은 모으고, 빨간 폭탄은 피하세요</p>
    <div class="tap">화면을 탭하면 시작</div>
  </div>

  <div class="layer hidden" id="overScreen">
    <h1>GAME OVER</h1>
    <div class="big" id="finalScore">0</div>
    <p id="bestMsg"></p>
    <div class="tap" id="retryHint">잠시 후 다시 도전</div>
  </div>

  <a class="home" href="../../index.html">← 홈으로</a>

<script>
"use strict";
(function () {
  var canvas = document.getElementById("c");
  var ctx = canvas.getContext("2d");
  var scoreEl = document.getElementById("score");
  var metaEl = document.getElementById("meta");
  var comboEl = document.getElementById("combo");
  var hud = document.getElementById("hud");
  var startScreen = document.getElementById("startScreen");
  var overScreen = document.getElementById("overScreen");
  var finalScore = document.getElementById("finalScore");
  var bestMsg = document.getElementById("bestMsg");

  var W, H;
  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener("resize", resize);
  resize();

  var best = 0;
  try { best = parseInt(window.localStorage.getItem("pixelfall_best"), 10) || 0; } catch (e) {}

  var G = {
    screen: "start",
    px: 0, pw: 84, ph: 16,
    items: [], particles: [],
    score: 0, combo: 0, bestCombo: 0,
    spawnT: 0, t: 0, shake: 0, overAt: 0,
    moveDir: 0   // keyboard: -1/0/1
  };

  function level() { return Math.floor(G.score / 12); }
  function fallSpeed() { return 3.4 + level() * 0.55; }
  function spawnGap() { return Math.max(26, 64 - level() * 4); }
  function bombChance() { return Math.min(0.28 + level() * 0.03, 0.6); }

  function playerY() { return H - 70; }

  function reset() {
    G.screen = "playing";
    G.px = W / 2;
    G.items = []; G.particles = [];
    G.score = 0; G.combo = 0; G.bestCombo = 0;
    G.spawnT = 0; G.t = 0; G.shake = 0; G.moveDir = 0;
    paintHud();
    hud.classList.remove("hidden");
    startScreen.classList.add("hidden");
    overScreen.classList.add("hidden");
  }

  function paintHud() {
    scoreEl.textContent = G.score;
    metaEl.textContent = (best ? "BEST " + best + "  ·  " : "") + "LV " + (level() + 1);
    comboEl.textContent = G.combo >= 2 ? "COMBO x" + G.combo : "";
  }

  function spawnItem() {
    var isBomb = Math.random() < bombChance();
    var r = isBomb ? 16 : 13;
    G.items.push({
      x: r + Math.random() * (W - r * 2),
      y: -r, r: r,
      vy: fallSpeed() * (0.85 + Math.random() * 0.4),
      type: isBomb ? "bomb" : "coin"
    });
  }

  function hitTest(item) {
    // circle vs player rect
    var rx = G.px - G.pw / 2, ry = playerY();
    var cx = Math.max(rx, Math.min(item.x, rx + G.pw));
    var cy = Math.max(ry, Math.min(item.y, ry + G.ph));
    var dx = item.x - cx, dy = item.y - cy;
    return dx * dx + dy * dy <= item.r * item.r;
  }

  function addParticles(x, y, color, n) {
    for (var i = 0; i < n; i++) {
      var a = Math.random() * Math.PI * 2, sp = 1 + Math.random() * 4;
      G.particles.push({ x: x, y: y, vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp - 1, life: 1, color: color });
    }
  }

  function gameOver() {
    G.screen = "over";
    G.overAt = Date.now();
    G.shake = 24;
    addParticles(G.px, playerY(), "#ff5d5d", 46);
    var isNew = G.score > best;
    if (isNew) {
      best = G.score;
      try { window.localStorage.setItem("pixelfall_best", String(best)); } catch (e) {}
    }
    setTimeout(function () {
      if (G.screen !== "over") return;
      finalScore.textContent = G.score;
      bestMsg.textContent = (isNew ? "🎉 신기록!  " : "BEST " + best + "  ") +
        "· 최고 콤보 x" + G.bestCombo;
      hud.classList.add("hidden");
      overScreen.classList.remove("hidden");
    }, 650);
  }

  function handleInput() {
    if (G.screen === "start") reset();
    else if (G.screen === "over") { if (Date.now() - G.overAt > 700) reset(); }
  }
  window.addEventListener("pointerdown", function (e) {
    if (e.target && e.target.classList && e.target.classList.contains("home")) return;
    e.preventDefault();
    if (G.screen === "playing") G.px = clampX(e.clientX);
    else handleInput();
  }, { passive: false });
  window.addEventListener("pointermove", function (e) {
    if (G.screen === "playing" && e.buttons >= 0) G.px = clampX(e.clientX);
  });
  window.addEventListener("keydown", function (e) {
    if (e.code === "ArrowLeft") G.moveDir = -1;
    else if (e.code === "ArrowRight") G.moveDir = 1;
    else if (e.code === "Space" || e.code === "Enter" || e.code === "ArrowUp") {
      e.preventDefault(); handleInput();
    }
  });
  window.addEventListener("keyup", function (e) {
    if ((e.code === "ArrowLeft" && G.moveDir === -1) ||
        (e.code === "ArrowRight" && G.moveDir === 1)) G.moveDir = 0;
  });
  function clampX(x) { return Math.max(G.pw / 2, Math.min(x, W - G.pw / 2)); }

  function update() {
    if (G.screen === "playing") {
      G.t++;
      if (G.moveDir) G.px = clampX(G.px + G.moveDir * 9);

      G.spawnT++;
      if (G.spawnT >= spawnGap()) { G.spawnT = 0; spawnItem(); }

      var keep = [];
      for (var i = 0; i < G.items.length; i++) {
        var it = G.items[i];
        it.y += it.vy;
        if (hitTest(it)) {
          if (it.type === "bomb") { gameOver(); return; }
          G.score += 1 + Math.floor(G.combo / 3);
          G.combo++;
          if (G.combo > G.bestCombo) G.bestCombo = G.combo;
          addParticles(it.x, it.y, "#e3b341", 16);
          G.shake = Math.max(G.shake, 5);
          paintHud();
          continue; // collected -> remove
        }
        if (it.y - it.r > H) {
          if (it.type === "coin") { G.combo = 0; paintHud(); }
          continue; // off screen -> remove
        }
        keep.push(it);
      }
      G.items = keep;
    }

    var pk = [];
    for (var k = 0; k < G.particles.length; k++) {
      var p = G.particles[k];
      p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.vx *= 0.97; p.life -= 0.025;
      if (p.life > 0) pk.push(p);
    }
    G.particles = pk;
    if (G.shake > 0.4) G.shake *= 0.86; else G.shake = 0;
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.save();
    if (G.shake > 0.4)
      ctx.translate((Math.random() - 0.5) * G.shake, (Math.random() - 0.5) * G.shake);

    if (G.screen === "playing" || G.screen === "over") {
      for (var i = 0; i < G.items.length; i++) {
        var it = G.items[i];
        ctx.beginPath();
        ctx.arc(it.x, it.y, it.r, 0, Math.PI * 2);
        if (it.type === "bomb") {
          ctx.fillStyle = "#ff5d5d"; ctx.shadowColor = "#ff5d5d";
        } else {
          ctx.fillStyle = "#e3b341"; ctx.shadowColor = "#e3b341";
        }
        ctx.shadowBlur = 14; ctx.fill(); ctx.shadowBlur = 0;
      }
      // player paddle
      var rx = G.px - G.pw / 2, ry = playerY();
      ctx.fillStyle = "#58a6ff";
      ctx.shadowColor = "#58a6ff"; ctx.shadowBlur = 16;
      roundRect(rx, ry, G.pw, G.ph, 8);
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    for (var q = 0; q < G.particles.length; q++) {
      var pt = G.particles[q];
      ctx.globalAlpha = pt.life > 0 ? pt.life : 0;
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, 3 * pt.life + 1, 0, Math.PI * 2);
      ctx.fillStyle = pt.color; ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }
  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function loop() { update(); draw(); window.requestAnimationFrame(loop); }

  window.__PIXEL__ = { G: G, update: update, handleInput: handleInput,
    hitTest: hitTest, reset: reset, level: level };

  loop();
})();
</script>
</body>
</html>
