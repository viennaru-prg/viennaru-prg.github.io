<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>ECHO — 프로젝트 3</title>
<style>
  html, body {
    margin: 0; height: 100%; overflow: hidden; background: #0b0e14;
    font-family: -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
    -webkit-tap-highlight-color: transparent; user-select: none;
  }
  #c { display: block; touch-action: none; }
  .layer {
    position: fixed; inset: 0; pointer-events: none; display: flex;
    flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; color: #e6edf3; text-align: center; padding: 24px; box-sizing: border-box;
  }
  .hud { justify-content: flex-start; padding-top: 20px; }
  .hud .score { font-size: 40px; font-weight: 800; letter-spacing: -1px; }
  .hud .meta { font-size: 13px; color: #8b949e; margin-top: 2px; }
  .hud .sh { font-size: 14px; color: #e3b341; font-weight: 700; margin-top: 3px; }
  h1 {
    font-size: clamp(40px, 12vw, 84px); margin: 0; letter-spacing: 8px;
    background: linear-gradient(90deg, #58a6ff, #a371f7);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .layer p { color: #8b949e; margin: 0; font-size: 15px; max-width: 460px; }
  .big { font-size: 28px; color: #e6edf3; font-weight: 700; }
  .tap { margin-top: 8px; font-size: 14px; color: #58a6ff; animation: blink 1.1s infinite; }
  @keyframes blink { 50% { opacity: .35; } }
  .cards { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; pointer-events: auto; }
  .upg {
    width: 168px; background: #161b22; border: 1px solid #30363d;
    border-radius: 12px; padding: 16px; cursor: pointer; color: #e6edf3;
    transition: border-color .12s, transform .12s;
  }
  .upg:hover { border-color: #58a6ff; transform: translateY(-3px); }
  .upg b { font-size: 15px; } .upg span { color: #8b949e; font-size: 12.5px; }
  .home {
    position: fixed; left: 16px; bottom: 14px; font-size: 13px;
    color: #8b949e; text-decoration: none; z-index: 9; pointer-events: auto;
  }
  .home:hover { color: #58a6ff; }
  .hidden { display: none !important; }
</style>
</head>
<body>
  <canvas id="c"></canvas>

  <div class="layer hud hidden" id="hud">
    <div class="score" id="score">0</div>
    <div class="meta" id="meta"></div>
    <div class="sh" id="sh"></div>
  </div>

  <div class="layer" id="startScreen">
    <h1>ECHO</h1>
    <p>마우스/손가락으로 이동 (WASD·화살표도 가능)</p>
    <p>좁혀오는 고리의 <b>예고된 틈</b>으로 빠져나가세요. 모든 고리는 미리
       보이고, 완벽히 움직이면 <b>반드시 생존 가능</b> — 운은 없습니다.
       스테이지마다 기믹이 바뀌고 중간보스·보스가 나옵니다.</p>
    <div class="tap">화면을 탭하면 시작</div>
  </div>

  <div class="layer hidden" id="upgScreen">
    <div class="big" id="upgTitle">업그레이드 선택</div>
    <p>샤드로 강화 (무작위 아님 — 전략 선택)</p>
    <div class="cards" id="upgCards"></div>
  </div>

  <div class="layer hidden" id="overScreen">
    <h1>GAME OVER</h1>
    <div class="big" id="finalScore">0</div>
    <p id="bestMsg"></p>
    <div class="tap" id="retryHint">잠시 후 다시 도전</div>
  </div>

  <a class="home" href="../../index.html">← 홈으로</a>

<script>
"use strict";
(function () {
  var $ = function (id) { return document.getElementById(id); };
  var canvas = $("c"), ctx = canvas.getContext("2d");
  var scoreEl = $("score"), metaEl = $("meta"), shEl = $("sh");
  var hud = $("hud"), startScreen = $("startScreen"),
      upgScreen = $("upgScreen"), overScreen = $("overScreen"),
      finalScore = $("finalScore"), bestMsg = $("bestMsg"),
      upgCards = $("upgCards"), upgTitle = $("upgTitle");

  var W, H, CX, CY, AR;       // arena center + radius
  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    CX = W / 2; CY = H / 2;
    AR = Math.min(W, H) * 0.46;
  }
  window.addEventListener("resize", resize);
  resize();

  var TAU = Math.PI * 2;
  var best = 0;
  try { best = parseInt(window.localStorage.getItem("echo_best"), 10) || 0; } catch (e) {}

  // ---- tuning (chosen so a perfect player ALWAYS survives) ----
  var BASE_VMAX = 6.2;        // player px/frame (upgradable)
  var PR_BASE = 11;           // player collision radius (downgradable = smaller hitbox)
  var RING_TH = 9;            // ring thickness (collision band)
  var WAVES_PER_STAGE = 6;
  var BOSS_HP = 8;

  function stageType(s) {
    if (s % 6 === 0) return "BOSS";
    if (s % 3 === 0) return "MINI";
    return "NORMAL";
  }
  // ring inward speed: slow enough that travel time from spawn (AR) to any
  // radius >= time for player to cross to the gap from the worst angle.
  function ringSpeed(stage, type) {
    var v = 1.05 + (stage - 1) * 0.06;
    if (type === "MINI") v *= 1.08;
    if (type === "BOSS") v *= 1.16;
    return Math.min(v, 2.4);
  }
  // gap arc width (radians). Kept so arc length at mid radius always exceeds
  // player diameter + margin -> reachable & passable (precision rises only).
  function gapW(stage, type) {
    var g = 1.15 - (stage - 1) * 0.035;
    if (type === "MINI") g -= 0.12;
    if (type === "BOSS") g -= 0.18;
    return Math.max(0.62, g);
  }
  // gap rotation per frame: strictly below player's angular speed at mid
  // radius (vmax / midR) so the player can always out-track the gap.
  function gapRot(stage, type) {
    var base = 0.006 + (stage - 1) * 0.0015;
    if (type !== "NORMAL") base += 0.003;
    return Math.min(base, 0.018);
  }
  // spacing between rings (frames) so at most ONE ring is near the player
  // at a time -> a single clear safe target each moment (no luck).
  function ringGap(stage, type) {
    var f = 150 - (stage - 1) * 6;
    if (type === "MINI") f -= 20;
    if (type === "BOSS") f -= 30;
    return Math.max(78, f);
  }

  var G = {
    screen: "start",
    px: 0, py: 0, tx: 0, ty: 0,
    vmax: BASE_VMAX, pr: PR_BASE, shardMul: 1, grazeR: 22,
    rings: [], parts: [],
    score: 0, shards: 0, stage: 1, stageType: "NORMAL",
    waveInStage: 0, spawnT: 0, ringSeq: 0,
    boss: { active: false, hp: 0, max: 0 },
    keys: { x: 0, y: 0 }, shake: 0, overAt: 0, banner: "", bannerT: 0,
    pendingUpg: null
  };

  function dist(ax, ay, bx, by) {
    var dx = ax - bx, dy = ay - by; return Math.sqrt(dx * dx + dy * dy);
  }
  function angNorm(a) { a %= TAU; if (a < 0) a += TAU; return a; }
  function angIn(a, c, halfW) {
    var d = Math.abs(angNorm(a - c));
    if (d > Math.PI) d = TAU - d;
    return d <= halfW;
  }

  function spawnRing() {
    var t = G.stageType;
    var prev = G.rings.length ? G.rings[G.rings.length - 1].gapA : Math.random() * TAU;
    // new gap within reach of the previous one's angle (continuity = fair)
    var maxShift = 1.2;
    var ga = angNorm(prev + (Math.random() * 2 - 1) * maxShift);
    G.rings.push({
      r: AR + RING_TH, v: ringSpeed(G.stage, t),
      gapA: ga, gapW: gapW(G.stage, t) / 2, rot: gapRot(G.stage, t) *
        (Math.random() < 0.5 ? -1 : 1),
      grazed: false, hitChecked: false, type: t
    });
    G.ringSeq++;
  }

  function configBanner() {
    var t = G.stageType;
    G.banner = (t === "BOSS" ? "👑 BOSS STAGE " : t === "MINI" ?
      "⚔ MINI-BOSS " : "STAGE ") + G.stage;
    G.bannerT = 80;
  }

  function startGame() {
    G.screen = "playing";
    G.px = CX; G.py = CY; G.tx = CX; G.ty = CY;
    G.vmax = BASE_VMAX; G.pr = PR_BASE; G.shardMul = 1; G.grazeR = 22;
    G.rings = []; G.parts = [];
    G.score = 0; G.shards = 0; G.stage = 1; G.stageType = "NORMAL";
    G.waveInStage = 0; G.spawnT = 0; G.ringSeq = 0;
    G.boss = { active: false, hp: 0, max: 0 };
    G.shake = 0; G.banner = ""; G.bannerT = 0; G.pendingUpg = null;
    configBanner();
    spawnRing();
    paintHud();
    hud.classList.remove("hidden");
    startScreen.classList.add("hidden");
    upgScreen.classList.add("hidden");
    overScreen.classList.add("hidden");
  }

  function paintHud() {
    scoreEl.textContent = G.score;
    var t = G.stageType === "BOSS" ? "👑 BOSS" :
      G.stageType === "MINI" ? "⚔ MINI" : "STAGE";
    metaEl.textContent = (best ? "BEST " + best + "  ·  " : "") +
      t + " " + G.stage + "  ·  WAVE " + G.ringSeq;
    shEl.textContent = "◆ " + G.shards + " shards";
  }

  var UPGRADES = [
    { k: "spd", t: "민첩", d: "이동속도 +12%", cost: 3,
      ap: function () { G.vmax *= 1.12; } },
    { k: "box", t: "소형 히트박스", d: "피격 반경 -18%", cost: 3,
      ap: function () { G.pr *= 0.82; } },
    { k: "grz", t: "그레이즈 확장", d: "그레이즈 보너스 반경 +35%", cost: 2,
      ap: function () { G.grazeR *= 1.35; } },
    { k: "shd", t: "샤드 증폭", d: "샤드 획득 +50%", cost: 2,
      ap: function () { G.shardMul *= 1.5; } }
  ];

  function openUpgrades() {
    G.screen = "upgrade";
    upgTitle.textContent = "STAGE " + G.stage + " 클리어 — 강화 선택  (◆ " +
      G.shards + ")";
    upgCards.innerHTML = "";
    UPGRADES.forEach(function (u) {
      var c = document.createElement("div");
      c.className = "upg";
      c.innerHTML = "<b>" + u.t + "</b><br><span>" + u.d +
        "</span><br><span>비용 ◆" + u.cost + "</span>";
      c.onclick = function () {
        if (G.shards < u.cost) return;
        G.shards -= u.cost; u.ap();
        resumeFromUpgrade();
      };
      upgCards.appendChild(c);
    });
    var skip = document.createElement("div");
    skip.className = "upg";
    skip.innerHTML = "<b>건너뛰기</b><br><span>샤드 보존</span>";
    skip.onclick = resumeFromUpgrade;
    upgCards.appendChild(skip);
    hud.classList.add("hidden");
    upgScreen.classList.remove("hidden");
  }
  function resumeFromUpgrade() {
    upgScreen.classList.add("hidden");
    hud.classList.remove("hidden");
    G.screen = "playing";
    enterStage(G.stage + 1);
    paintHud();
  }

  function enterStage(s) {
    G.stage = s;
    G.stageType = stageType(s);
    G.waveInStage = 0;
    if (G.stageType === "BOSS")
      G.boss = { active: true, hp: BOSS_HP, max: BOSS_HP };
    else G.boss = { active: false, hp: 0, max: 0 };
    configBanner();
  }

  function addParts(x, y, color, n) {
    for (var i = 0; i < n; i++) {
      var a = Math.random() * TAU, s = 1 + Math.random() * 4;
      G.parts.push({ x: x, y: y, vx: Math.cos(a) * s, vy: Math.sin(a) * s,
        life: 1, color: color });
    }
  }

  function gameOver() {
    G.screen = "over";
    G.overAt = Date.now();
    G.shake = 24;
    addParts(G.px, G.py, "#ff5d5d", 50);
    var isNew = G.score > best;
    if (isNew) {
      best = G.score;
      try { window.localStorage.setItem("echo_best", String(best)); } catch (e) {}
    }
    setTimeout(function () {
      if (G.screen !== "over") return;
      finalScore.textContent = G.score;
      bestMsg.textContent = (isNew ? "🎉 신기록!  " : "BEST " + best + "  ") +
        "· STAGE " + G.stage;
      hud.classList.add("hidden");
      overScreen.classList.remove("hidden");
    }, 650);
  }

  function handleTap() {
    if (G.screen === "start") startGame();
    else if (G.screen === "over") { if (Date.now() - G.overAt > 700) startGame(); }
  }
  window.addEventListener("pointerdown", function (e) {
    if (e.target && e.target.classList &&
        (e.target.classList.contains("home") ||
         e.target.classList.contains("upg"))) return;
    e.preventDefault();
    if (G.screen === "playing") { G.tx = e.clientX; G.ty = e.clientY; }
    else handleTap();
  }, { passive: false });
  window.addEventListener("pointermove", function (e) {
    if (G.screen === "playing") { G.tx = e.clientX; G.ty = e.clientY; }
  });
  window.addEventListener("keydown", function (e) {
    var k = e.code;
    if (k === "ArrowLeft" || k === "KeyA") G.keys.x = -1;
    else if (k === "ArrowRight" || k === "KeyD") G.keys.x = 1;
    else if (k === "ArrowUp" || k === "KeyW") G.keys.y = -1;
    else if (k === "ArrowDown" || k === "KeyS") G.keys.y = 1;
    else if (k === "Space" || k === "Enter") { e.preventDefault(); handleTap(); }
  });
  window.addEventListener("keyup", function (e) {
    var k = e.code;
    if (((k === "ArrowLeft" || k === "KeyA") && G.keys.x < 0) ||
        ((k === "ArrowRight" || k === "KeyD") && G.keys.x > 0)) G.keys.x = 0;
    if (((k === "ArrowUp" || k === "KeyW") && G.keys.y < 0) ||
        ((k === "ArrowDown" || k === "KeyS") && G.keys.y > 0)) G.keys.y = 0;
  });

  function clampToArena(x, y) {
    var d = dist(x, y, CX, CY), lim = AR - G.pr - 2;
    if (d <= lim) return { x: x, y: y };
    var k = lim / d;
    return { x: CX + (x - CX) * k, y: CY + (y - CY) * k };
  }

  function movePlayer() {
    var nx = G.px, ny = G.py;
    if (G.keys.x || G.keys.y) {
      var L = Math.hypot(G.keys.x, G.keys.y) || 1;
      nx += (G.keys.x / L) * G.vmax;
      ny += (G.keys.y / L) * G.vmax;
      G.tx = nx; G.ty = ny;
    } else {
      var dx = G.tx - G.px, dy = G.ty - G.py, d = Math.hypot(dx, dy);
      if (d <= G.vmax) { nx = G.tx; ny = G.ty; }
      else { nx += dx / d * G.vmax; ny += dy / d * G.vmax; }
    }
    var c = clampToArena(nx, ny);
    G.px = c.x; G.py = c.y;
  }

  function update() {
    if (G.screen === "playing") {
      movePlayer();

      // spawn rings with stage-dependent spacing
      G.spawnT++;
      if (G.spawnT >= ringGap(G.stage, G.stageType)) { G.spawnT = 0; spawnRing(); }

      var pr = dist(G.px, G.py, CX, CY);
      var pa = angNorm(Math.atan2(G.py - CY, G.px - CX));
      var keep = [];
      for (var i = 0; i < G.rings.length; i++) {
        var R = G.rings[i];
        R.r -= R.v;
        R.gapA = angNorm(R.gapA + R.rot);

        // collision: ring band crosses the player's radius
        if (!R.hitChecked && Math.abs(R.r - pr) <= RING_TH + G.pr) {
          if (!angIn(pa, R.gapA, R.gapW)) { gameOver(); return; }
          // grazed safely through the gap
          if (!R.grazed) {
            R.grazed = true; R.hitChecked = true;
            G.score += 1;
            var edge = Math.abs(Math.abs(angNorm(pa - R.gapA)) - 0) ;
            var gain = Math.round((1 + (R.type === "BOSS" ? 2 :
              R.type === "MINI" ? 1 : 0)) * G.shardMul);
            G.shards += Math.max(1, gain);
            G.waveInStage++;
            addParts(G.px, G.py, R.type === "BOSS" ? "#e3b341" :
              R.type === "MINI" ? "#a371f7" : "#3fb950", 14);
            G.shake = Math.max(G.shake, 5);

            if (G.boss.active) {
              G.boss.hp--;
              if (G.boss.hp <= 0) {
                G.boss.active = false;
                G.score += 15;
                addParts(CX, CY, "#3fb950", 60);
                G.shake = Math.max(G.shake, 16);
                G.banner = "BOSS CLEAR  +15"; G.bannerT = 90;
                G.pendingUpg = true;
              }
            } else if (G.waveInStage >= WAVES_PER_STAGE) {
              G.pendingUpg = true;
            }
            paintHud();
          }
        }
        if (R.r > -RING_TH) keep.push(R);
      }
      G.rings = keep;

      // when a stage's quota is done (and any boss cleared) -> upgrade screen
      if (G.pendingUpg && !G.boss.active) {
        G.pendingUpg = null;
        openUpgrades();
      }
      if (G.bannerT > 0) G.bannerT--;
    }

    var pk = [];
    for (var q = 0; q < G.parts.length; q++) {
      var p = G.parts[q];
      p.x += p.vx; p.y += p.vy; p.vx *= 0.95; p.vy *= 0.95; p.life -= 0.025;
      if (p.life > 0) pk.push(p);
    }
    G.parts = pk;
    if (G.shake > 0.4) G.shake *= 0.86; else G.shake = 0;
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.save();
    if (G.shake > 0.4)
      ctx.translate((Math.random() - .5) * G.shake, (Math.random() - .5) * G.shake);

    // arena
    ctx.beginPath(); ctx.arc(CX, CY, AR, 0, TAU);
    ctx.strokeStyle = "rgba(139,148,158,0.22)"; ctx.lineWidth = 2; ctx.stroke();

    if (G.screen === "playing" || G.screen === "over" || G.screen === "upgrade") {
      for (var i = 0; i < G.rings.length; i++) {
        var R = G.rings[i];
        if (R.r < 4) continue;
        var col = R.type === "BOSS" ? "#e3b341" :
          R.type === "MINI" ? "#a371f7" : "#58a6ff";
        ctx.strokeStyle = col; ctx.lineWidth = RING_TH;
        ctx.beginPath();
        ctx.arc(CX, CY, R.r, R.gapA + R.gapW, R.gapA - R.gapW + TAU);
        ctx.stroke();
        // gap edge telegraph
        ctx.strokeStyle = "rgba(63,185,80,0.7)"; ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(CX, CY, R.r, R.gapA - R.gapW, R.gapA + R.gapW);
        ctx.stroke();
      }
      // player
      ctx.fillStyle = "#fff";
      ctx.shadowColor = "#fff"; ctx.shadowBlur = 14;
      ctx.beginPath(); ctx.arc(G.px, G.py, G.pr, 0, TAU); ctx.fill();
      ctx.shadowBlur = 0;

      if (G.boss.active) {
        var bw = Math.min(W - 80, 380), bx = (W - bw) / 2;
        ctx.fillStyle = "rgba(255,255,255,0.12)"; ctx.fillRect(bx, 70, bw, 12);
        ctx.fillStyle = "#e3b341";
        ctx.fillRect(bx, 70, bw * (G.boss.hp / G.boss.max), 12);
      }
      if (G.bannerT > 0) {
        ctx.globalAlpha = Math.min(1, G.bannerT / 28);
        ctx.fillStyle = "#e6edf3";
        ctx.font = "700 30px -apple-system, Segoe UI, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(G.banner, W / 2, H * 0.34);
        ctx.globalAlpha = 1;
      }
    }

    for (var q = 0; q < G.parts.length; q++) {
      var p = G.parts[q];
      ctx.globalAlpha = p.life > 0 ? p.life : 0;
      ctx.beginPath(); ctx.arc(p.x, p.y, 3 * p.life + 1, 0, TAU);
      ctx.fillStyle = p.color; ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  function loop() { update(); draw(); window.requestAnimationFrame(loop); }

  window.__ECHO__ = {
    G: G, update: update, startGame: startGame, handleTap: handleTap,
    resumeUpgrade: resumeFromUpgrade,
    enterStage: enterStage, stageType: stageType, ringSpeed: ringSpeed,
    gapW: gapW, gapRot: gapRot, ringGap: ringGap, spawnRing: spawnRing,
    angNorm: angNorm, angIn: angIn, dist: dist,
    arena: function () { return { CX: CX, CY: CY, AR: AR }; },
    consts: { RING_TH: RING_TH, WAVES_PER_STAGE: WAVES_PER_STAGE,
      BOSS_HP: BOSS_HP, BASE_VMAX: BASE_VMAX, PR_BASE: PR_BASE }
  };

  loop();
})();
</script>
</body>
</html>
