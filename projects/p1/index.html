<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>ORBIT — 프로젝트 1</title>
<style>
  html, body {
    margin: 0; height: 100%; overflow: hidden;
    background: #0d1117;
    font-family: -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  #c { display: block; touch-action: none; }
  .hud {
    position: fixed; top: 18px; left: 0; right: 0;
    text-align: center; color: #e6edf3; pointer-events: none;
  }
  .hud .score { font-size: 44px; font-weight: 800; letter-spacing: -1px; }
  .hud .best { font-size: 13px; color: #8b949e; margin-top: 2px; }
  .overlay {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px;
    color: #e6edf3; text-align: center; padding: 24px;
  }
  .overlay h1 {
    font-size: clamp(40px, 12vw, 88px); margin: 0; letter-spacing: 4px;
    background: linear-gradient(90deg, #58a6ff, #a371f7);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .overlay p { color: #8b949e; margin: 0; font-size: 16px; }
  .overlay .big { font-size: 30px; color: #e6edf3; font-weight: 700; }
  .tap { margin-top: 10px; font-size: 14px; color: #58a6ff; animation: blink 1.1s infinite; }
  @keyframes blink { 50% { opacity: .35; } }
  .home {
    position: fixed; left: 16px; bottom: 14px; font-size: 13px;
    color: #8b949e; text-decoration: none; z-index: 5;
  }
  .home:hover { color: #58a6ff; }
  .hidden { display: none !important; }
</style>
</head>
<body>
  <canvas id="c"></canvas>

  <div class="hud hidden" id="hud">
    <div class="score" id="score">0</div>
    <div class="best" id="bestLine"></div>
  </div>

  <div class="overlay" id="startScreen">
    <h1>ORBIT</h1>
    <p>탭/클릭/스페이스 → 회전 방향 반전</p>
    <p>파란 점은 먹고, 빨간 호는 피하세요</p>
    <div class="tap">화면을 탭하면 시작</div>
  </div>

  <div class="overlay hidden" id="overScreen">
    <h1>GAME OVER</h1>
    <div class="big" id="finalScore">0</div>
    <p id="bestMsg"></p>
    <div class="tap">탭해서 다시 도전</div>
  </div>

  <a class="home" href="../../index.html">← 홈으로</a>

<script>
(() => {
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");
  const scoreEl = document.getElementById("score");
  const bestLine = document.getElementById("bestLine");
  const hud = document.getElementById("hud");
  const startScreen = document.getElementById("startScreen");
  const overScreen = document.getElementById("overScreen");
  const finalScore = document.getElementById("finalScore");
  const bestMsg = document.getElementById("bestMsg");

  let W, H, cx, cy, R;
  function resize() {
    W = canvas.width = innerWidth;
    H = canvas.height = innerHeight;
    cx = W / 2; cy = H / 2;
    R = Math.min(W, H) * 0.30;
  }
  addEventListener("resize", resize);
  resize();

  const TAU = Math.PI * 2;
  let best = +(localStorage.getItem("orbit_best") || 0);

  let state, angle, dir, speed, score, ball, dot, obstacles, particles, shake, hueShift;

  function reset() {
    state = "play";
    angle = -Math.PI / 2;
    dir = 1;
    speed = 0.028;
    score = 0;
    obstacles = [];
    particles = [];
    shake = 0;
    hueShift = 0;
    spawnDot();
    hud.classList.remove("hidden");
    startScreen.classList.add("hidden");
    overScreen.classList.add("hidden");
    updateScore();
  }

  function spawnDot() {
    // place dot at an angle away from the ball, not overlapping an obstacle
    let a;
    for (let i = 0; i < 30; i++) {
      a = Math.random() * TAU;
      let gap = Math.abs(angDiff(a, angle));
      if (gap > 0.9 && !inAnyObstacle(a)) break;
    }
    dot = { a, pulse: 0 };
  }

  function maybeSpawnObstacle() {
    // difficulty: more / wider arcs as score climbs
    const count = obstacles.length;
    const target = Math.min(1 + Math.floor(score / 6), 5);
    if (count >= target) return;
    let a;
    for (let i = 0; i < 30; i++) {
      a = Math.random() * TAU;
      if (Math.abs(angDiff(a, angle)) > 1.1 &&
          Math.abs(angDiff(a, dot.a)) > 0.6 && !inAnyObstacle(a)) break;
    }
    const half = 0.28 + Math.min(score, 30) * 0.004;
    const rot = (Math.random() < 0.5 ? -1 : 1) * (0.002 + Math.random() * 0.006);
    obstacles.push({ a, half, rot });
  }

  function angDiff(a, b) {
    let d = (a - b) % TAU;
    if (d > Math.PI) d -= TAU;
    if (d < -Math.PI) d += TAU;
    return d;
  }
  function inAnyObstacle(a) {
    return obstacles.some(o => Math.abs(angDiff(a, o.a)) < o.half + 0.15);
  }

  function flip() {
    if (state === "play") { dir *= -1; addParticles(ballPos(), "#58a6ff", 6); }
    else { reset(); }
  }
  function ballPos() {
    return { x: cx + Math.cos(angle) * R, y: cy + Math.sin(angle) * R };
  }

  function addParticles(p, color, n) {
    for (let i = 0; i < n; i++) {
      const a = Math.random() * TAU, sp = 1 + Math.random() * 4;
      particles.push({ x: p.x, y: p.y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
                        life: 1, color });
    }
  }

  function updateScore() {
    scoreEl.textContent = score;
    bestLine.textContent = best ? "BEST " + best : "";
  }

  function gameOver() {
    state = "over";
    shake = 22;
    addParticles(ballPos(), "#ff5d5d", 40);
    const newBest = score > best;
    if (newBest) { best = score; localStorage.setItem("orbit_best", best); }
    setTimeout(() => {
      finalScore.textContent = score;
      bestMsg.textContent = newBest ? "🎉 신기록!" : "BEST " + best;
      hud.classList.add("hidden");
      overScreen.classList.remove("hidden");
    }, 650);
  }

  function step() {
    if (state === "play") {
      angle = (angle + dir * speed + TAU) % TAU;

      // obstacles rotate
      for (const o of obstacles) o.a = (o.a + o.rot + TAU) % TAU;

      // collect dot
      dot.pulse += 0.15;
      if (Math.abs(angDiff(angle, dot.a)) < 0.16) {
        score++;
        speed += 0.0016;
        hueShift = (hueShift + 24) % 360;
        addParticles(ballPos(), "#58a6ff", 18);
        shake = Math.max(shake, 6);
        updateScore();
        maybeSpawnObstacle();
        spawnDot();
      }

      // hit obstacle
      for (const o of obstacles) {
        if (Math.abs(angDiff(angle, o.a)) < o.half) { gameOver(); break; }
      }
    }

    // particles
    for (const p of particles) {
      p.x += p.vx; p.y += p.vy; p.vx *= 0.94; p.vy *= 0.94; p.life -= 0.025;
    }
    particles = particles.filter(p => p.life > 0);
    if (shake > 0) shake *= 0.88;
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.save();
    if (shake > 0.4)
      ctx.translate((Math.random() - .5) * shake, (Math.random() - .5) * shake);

    // orbit ring
    ctx.beginPath();
    ctx.arc(cx, cy, R, 0, TAU);
    ctx.strokeStyle = "rgba(139,148,158,0.25)";
    ctx.lineWidth = 2;
    ctx.stroke();

    // center core
    ctx.beginPath();
    ctx.arc(cx, cy, 9, 0, TAU);
    ctx.fillStyle = `hsl(${210 + hueShift},90%,65%)`;
    ctx.fill();

    if (state !== "ready") {
      // obstacles
      for (const o of obstacles) {
        ctx.beginPath();
        ctx.arc(cx, cy, R, o.a - o.half, o.a + o.half);
        ctx.strokeStyle = "#ff5d5d";
        ctx.lineWidth = 14;
        ctx.lineCap = "round";
        ctx.stroke();
      }
      // dot
      const dx = cx + Math.cos(dot.a) * R, dy = cy + Math.sin(dot.a) * R;
      const r = 9 + Math.sin(dot.pulse) * 3;
      ctx.beginPath();
      ctx.arc(dx, dy, r, 0, TAU);
      ctx.fillStyle = "#58a6ff";
      ctx.shadowColor = "#58a6ff"; ctx.shadowBlur = 18;
      ctx.fill();
      ctx.shadowBlur = 0;

      // ball
      const b = ballPos();
      ctx.beginPath();
      ctx.arc(b.x, b.y, 12, 0, TAU);
      ctx.fillStyle = "#fff";
      ctx.shadowColor = "#fff"; ctx.shadowBlur = 14;
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    // particles
    for (const p of particles) {
      ctx.globalAlpha = Math.max(p.life, 0);
      ctx.beginPath();
      ctx.arc(p.x, p.y, 4 * p.life + 1, 0, TAU);
      ctx.fillStyle = p.color;
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  function loop() { step(); draw(); requestAnimationFrame(loop); }

  state = "ready";
  // input
  function onTap(e) { e.preventDefault(); flip(); }
  canvas.addEventListener("pointerdown", onTap);
  startScreen.addEventListener("pointerdown", (e) => { e.preventDefault(); reset(); });
  overScreen.addEventListener("pointerdown", (e) => { e.preventDefault(); reset(); });
  addEventListener("keydown", (e) => {
    if (e.code === "Space" || e.code === "ArrowUp") {
      e.preventDefault();
      if (state === "play") flip(); else reset();
    }
  });

  loop();
})();
</script>
</body>
</html>
