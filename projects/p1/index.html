<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>ORBIT — 프로젝트 1</title>
<style>
  html, body {
    margin: 0; height: 100%; overflow: hidden; background: #0d1117;
    font-family: -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
    -webkit-tap-highlight-color: transparent; user-select: none;
  }
  #c { display: block; touch-action: none; }
  .layer {
    position: fixed; inset: 0; pointer-events: none;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 14px; color: #e6edf3;
    text-align: center; padding: 24px; box-sizing: border-box;
  }
  .hud { justify-content: flex-start; padding-top: 26px; }
  .hud .score { font-size: 46px; font-weight: 800; letter-spacing: -1px; }
  .hud .best { font-size: 13px; color: #8b949e; margin-top: 2px; }
  h1 {
    font-size: clamp(40px, 12vw, 88px); margin: 0; letter-spacing: 4px;
    background: linear-gradient(90deg, #58a6ff, #a371f7);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .layer p { color: #8b949e; margin: 0; font-size: 16px; }
  .big { font-size: 30px; color: #e6edf3; font-weight: 700; }
  .tap { margin-top: 10px; font-size: 14px; color: #58a6ff; animation: blink 1.1s infinite; }
  @keyframes blink { 50% { opacity: .35; } }
  .home {
    position: fixed; left: 16px; bottom: 14px; font-size: 13px;
    color: #8b949e; text-decoration: none; z-index: 9; pointer-events: auto;
  }
  .home:hover { color: #58a6ff; }
  .hidden { display: none !important; }
</style>
</head>
<body>
  <canvas id="c"></canvas>

  <div class="layer hud hidden" id="hud">
    <div class="score" id="score">0</div>
    <div class="best" id="bestLine"></div>
  </div>

  <div class="layer" id="startScreen">
    <h1>ORBIT</h1>
    <p>탭 / 클릭 / 스페이스 → 회전 방향 반전</p>
    <p>파란 점은 먹고, 빨간 호는 피하세요</p>
    <div class="tap">화면을 탭하면 시작</div>
  </div>

  <div class="layer hidden" id="overScreen">
    <h1>GAME OVER</h1>
    <div class="big" id="finalScore">0</div>
    <p id="bestMsg"></p>
    <div class="tap" id="retryHint">잠시 후 다시 도전할 수 있어요</div>
  </div>

  <a class="home" href="../../index.html">← 홈으로</a>

<script>
"use strict";
(function () {
  var canvas = document.getElementById("c");
  var ctx = canvas.getContext("2d");
  var scoreEl = document.getElementById("score");
  var bestLine = document.getElementById("bestLine");
  var hud = document.getElementById("hud");
  var startScreen = document.getElementById("startScreen");
  var overScreen = document.getElementById("overScreen");
  var finalScore = document.getElementById("finalScore");
  var bestMsg = document.getElementById("bestMsg");
  var retryHint = document.getElementById("retryHint");

  var TAU = Math.PI * 2;
  var W, H, cx, cy, R;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    cx = W / 2; cy = H / 2;
    R = Math.min(W, H) * 0.30;
  }
  window.addEventListener("resize", resize);
  resize();

  var best = 0;
  try { best = parseInt(window.localStorage.getItem("orbit_best"), 10) || 0; } catch (e) {}

  // --- game state ---
  var G = {
    screen: "start",      // start | playing | over
    angle: -Math.PI / 2,
    dir: 1,
    speed: 0.028,
    score: 0,
    dotA: 0,
    dotPulse: 0,
    obstacles: [],
    particles: [],
    shake: 0,
    overAt: 0
  };

  function angDiff(a, b) {
    var d = (a - b) % TAU;
    if (d > Math.PI) d -= TAU;
    if (d < -Math.PI) d += TAU;
    return d;
  }
  function inAnyObstacle(a, pad) {
    for (var i = 0; i < G.obstacles.length; i++) {
      if (Math.abs(angDiff(a, G.obstacles[i].a)) < G.obstacles[i].half + pad) return true;
    }
    return false;
  }
  function ballPos() {
    return { x: cx + Math.cos(G.angle) * R, y: cy + Math.sin(G.angle) * R };
  }

  function spawnDot() {
    var a = Math.random() * TAU;
    for (var i = 0; i < 40; i++) {
      a = Math.random() * TAU;
      if (Math.abs(angDiff(a, G.angle)) > 0.9 && !inAnyObstacle(a, 0.15)) break;
    }
    G.dotA = a; G.dotPulse = 0;
  }

  function maybeSpawnObstacle() {
    var target = Math.min(1 + Math.floor(G.score / 6), 5);
    if (G.obstacles.length >= target) return;
    var a = Math.random() * TAU;
    for (var i = 0; i < 40; i++) {
      a = Math.random() * TAU;
      if (Math.abs(angDiff(a, G.angle)) > 1.1 &&
          Math.abs(angDiff(a, G.dotA)) > 0.6 && !inAnyObstacle(a, 0.2)) break;
    }
    var half = 0.26 + Math.min(G.score, 30) * 0.004;
    var rot = (Math.random() < 0.5 ? -1 : 1) * (0.002 + Math.random() * 0.005);
    G.obstacles.push({ a: a, half: half, rot: rot });
  }

  function addParticles(p, color, n) {
    for (var i = 0; i < n; i++) {
      var a = Math.random() * TAU, sp = 1 + Math.random() * 4;
      G.particles.push({ x: p.x, y: p.y, vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp, life: 1, color: color });
    }
  }

  function updateScore() {
    scoreEl.textContent = G.score;
    bestLine.textContent = best ? "BEST " + best : "";
  }

  function startGame() {
    G.screen = "playing";
    G.angle = -Math.PI / 2;
    G.dir = 1;
    G.speed = 0.028;
    G.score = 0;
    G.obstacles = [];
    G.particles = [];
    G.shake = 0;
    spawnDot();
    updateScore();
    hud.classList.remove("hidden");
    startScreen.classList.add("hidden");
    overScreen.classList.add("hidden");
  }

  function flip() {
    G.dir *= -1;
    addParticles(ballPos(), "#58a6ff", 6);
  }

  function gameOver() {
    G.screen = "over";
    G.overAt = Date.now();
    G.shake = 22;
    addParticles(ballPos(), "#ff5d5d", 40);
    var isNew = G.score > best;
    if (isNew) {
      best = G.score;
      try { window.localStorage.setItem("orbit_best", String(best)); } catch (e) {}
    }
    setTimeout(function () {
      if (G.screen !== "over") return;
      finalScore.textContent = G.score;
      bestMsg.textContent = isNew ? "🎉 신기록!" : "BEST " + best;
      hud.classList.add("hidden");
      overScreen.classList.remove("hidden");
    }, 650);
  }

  // single global input handler — routes by screen state
  function handleInput() {
    if (G.screen === "start") { startGame(); }
    else if (G.screen === "playing") { flip(); }
    else if (G.screen === "over") {
      if (Date.now() - G.overAt > 700) startGame();
    }
  }
  window.addEventListener("pointerdown", function (e) {
    if (e.target && e.target.classList && e.target.classList.contains("home")) return;
    e.preventDefault();
    handleInput();
  }, { passive: false });
  window.addEventListener("keydown", function (e) {
    if (e.code === "Space" || e.code === "ArrowUp" || e.code === "Enter") {
      e.preventDefault();
      handleInput();
    }
  });

  function update() {
    if (G.screen === "playing") {
      G.angle = (G.angle + G.dir * G.speed + TAU) % TAU;
      for (var i = 0; i < G.obstacles.length; i++) {
        var o = G.obstacles[i];
        o.a = (o.a + o.rot + TAU) % TAU;
      }
      G.dotPulse += 0.15;
      if (Math.abs(angDiff(G.angle, G.dotA)) < 0.16) {
        G.score++;
        G.speed += 0.0016;
        addParticles(ballPos(), "#58a6ff", 18);
        G.shake = Math.max(G.shake, 6);
        updateScore();
        maybeSpawnObstacle();
        spawnDot();
      }
      for (var j = 0; j < G.obstacles.length; j++) {
        if (Math.abs(angDiff(G.angle, G.obstacles[j].a)) < G.obstacles[j].half) {
          gameOver();
          break;
        }
      }
    }
    var kept = [];
    for (var k = 0; k < G.particles.length; k++) {
      var p = G.particles[k];
      p.x += p.vx; p.y += p.vy; p.vx *= 0.94; p.vy *= 0.94; p.life -= 0.025;
      if (p.life > 0) kept.push(p);
    }
    G.particles = kept;
    if (G.shake > 0.4) G.shake *= 0.88; else G.shake = 0;
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.save();
    if (G.shake > 0.4) {
      ctx.translate((Math.random() - 0.5) * G.shake, (Math.random() - 0.5) * G.shake);
    }

    ctx.beginPath();
    ctx.arc(cx, cy, R, 0, TAU);
    ctx.strokeStyle = "rgba(139,148,158,0.25)";
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(cx, cy, 9, 0, TAU);
    ctx.fillStyle = "#58a6ff";
    ctx.fill();

    if (G.screen === "playing" || G.screen === "over") {
      for (var i = 0; i < G.obstacles.length; i++) {
        var o = G.obstacles[i];
        ctx.beginPath();
        ctx.arc(cx, cy, R, o.a - o.half, o.a + o.half);
        ctx.strokeStyle = "#ff5d5d";
        ctx.lineWidth = 14;
        ctx.lineCap = "round";
        ctx.stroke();
      }
      var dx = cx + Math.cos(G.dotA) * R, dy = cy + Math.sin(G.dotA) * R;
      var rr = 9 + Math.sin(G.dotPulse) * 3;
      ctx.beginPath();
      ctx.arc(dx, dy, rr, 0, TAU);
      ctx.fillStyle = "#58a6ff";
      ctx.shadowColor = "#58a6ff"; ctx.shadowBlur = 18;
      ctx.fill();
      ctx.shadowBlur = 0;

      var b = ballPos();
      ctx.beginPath();
      ctx.arc(b.x, b.y, 12, 0, TAU);
      ctx.fillStyle = "#fff";
      ctx.shadowColor = "#fff"; ctx.shadowBlur = 14;
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    for (var q = 0; q < G.particles.length; q++) {
      var pt = G.particles[q];
      ctx.globalAlpha = pt.life > 0 ? pt.life : 0;
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, 4 * pt.life + 1, 0, TAU);
      ctx.fillStyle = pt.color;
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  function loop() {
    update();
    draw();
    window.requestAnimationFrame(loop);
  }

  // expose for headless test harness only
  window.__ORBIT__ = { G: G, update: update, handleInput: handleInput,
    angDiff: angDiff, startGame: startGame };

  loop();
})();
</script>
</body>
</html>
