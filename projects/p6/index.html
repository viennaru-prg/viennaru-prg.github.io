<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>ORBITAL — 프로젝트 6</title>
<style>
  html, body {
    margin: 0; height: 100%; overflow: hidden; background: #05060c;
    font-family: -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
    -webkit-tap-highlight-color: transparent; user-select: none;
  }
  #c { display: block; touch-action: none; }
  .layer {
    position: fixed; inset: 0; pointer-events: none; display: flex;
    flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; color: #e6edf3; text-align: center; padding: 24px; box-sizing: border-box;
  }
  .hud { justify-content: flex-start; padding-top: 16px; }
  .hud .score { font-size: 38px; font-weight: 800; }
  .hud .meta { font-size: 13px; color: #9aa4b2; margin-top: 2px; }
  .hud .shots { font-size: 15px; color: #f0883e; font-weight: 700; margin-top: 3px; height: 18px; }
  h1 {
    font-size: clamp(42px, 13vw, 88px); margin: 0; letter-spacing: 9px;
    background: linear-gradient(90deg, #58a6ff, #39d353, #e3b341);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .layer p { color: #9aa4b2; margin: 0; font-size: 15px; max-width: 520px; }
  .asc { color: #e3b341; font-size: 14px; font-weight: 700; }
  .big { font-size: 26px; color: #e6edf3; font-weight: 700; }
  .tap { margin-top: 8px; font-size: 14px; color: #58a6ff; animation: blink 1.1s infinite; }
  @keyframes blink { 50% { opacity: .35; } }
  .cards { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; pointer-events: auto; }
  .upg {
    width: 172px; background: #11161f; border: 1px solid #2b3240;
    border-radius: 12px; padding: 15px; cursor: pointer; color: #e6edf3;
    transition: border-color .12s, transform .12s;
  }
  .upg:hover { border-color: #58a6ff; transform: translateY(-3px); }
  .upg b { font-size: 15px; } .upg span { color: #9aa4b2; font-size: 12.5px; }
  .home {
    position: fixed; left: 16px; bottom: 14px; font-size: 13px;
    color: #9aa4b2; text-decoration: none; z-index: 9; pointer-events: auto;
  }
  .home:hover { color: #58a6ff; }
  .hidden { display: none !important; }
</style>
</head>
<body>
  <canvas id="c"></canvas>

  <div class="layer hud hidden" id="hud">
    <div class="score" id="score">0</div>
    <div class="meta" id="meta"></div>
    <div class="shots" id="shots"></div>
  </div>

  <div class="layer" id="startScreen">
    <h1>ORBITAL</h1>
    <p>혜성을 <b>드래그로 조준</b>(방향·세기)해 발사하세요. 행성 중력이
       궤도를 휩니다. 점선 예측 경로를 보고 <b>포탈</b>에 명중시키면 클리어.
       같은 조준은 항상 같은 결과 — 운이 아니라 계산과 실력입니다.</p>
    <p>여러 영역과 네임드 보스. 모은 별은 사라지지 않고 누적되어
       다음 항해를 강하게 합니다(승천).</p>
    <div class="asc" id="ascLine"></div>
    <div class="tap">화면을 탭하면 시작</div>
  </div>

  <div class="layer hidden" id="upgScreen">
    <div class="big" id="upgTitle">강화 선택</div>
    <p>별로 강화 (매번 무작위 3종)</p>
    <div class="cards" id="upgCards"></div>
  </div>

  <div class="layer hidden" id="overScreen">
    <h1>VOYAGE END</h1>
    <div class="big" id="finalScore">0</div>
    <p id="bestMsg"></p>
    <p id="ascGain" class="asc"></p>
    <div class="tap" id="retryHint">잠시 후 다시 항해</div>
  </div>

  <a class="home" href="../../index.html">← 홈으로</a>

<script>
"use strict";
(function () {
  var $ = function (id) { return document.getElementById(id); };
  var canvas = $("c"), ctx = canvas.getContext("2d");
  var scoreEl = $("score"), metaEl = $("meta"), shotsEl = $("shots"),
      hud = $("hud"), startScreen = $("startScreen"),
      upgScreen = $("upgScreen"), overScreen = $("overScreen"),
      finalScore = $("finalScore"), bestMsg = $("bestMsg"),
      ascLine = $("ascLine"), ascGain = $("ascGain"),
      upgCards = $("upgCards"), upgTitle = $("upgTitle");

  // ---- fixed virtual world (determinism independent of screen) ----
  var VW = 1000, VH = 640;
  var VIEW = { s: 1, ox: 0, oy: 0 };
  var W, H;
  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    var s = Math.min(W / VW, H / VH);
    VIEW.s = s; VIEW.ox = (W - VW * s) / 2; VIEW.oy = (H - VH * s) / 2;
  }
  window.addEventListener("resize", resize);
  resize();
  function sx(x) { return VIEW.ox + x * VIEW.s; }
  function sy(y) { return VIEW.oy + y * VIEW.s; }
  function wx(px) { return (px - VIEW.ox) / VIEW.s; }
  function wy(py) { return (py - VIEW.oy) / VIEW.s; }

  // ---- procedural audio (guarded/optional) ----
  var AC = null;
  function beep(f, d, t, v) {
    try {
      if (!AC) { var X = window.AudioContext || window.webkitAudioContext;
        if (X) AC = new X(); }
      if (!AC) return;
      var o = AC.createOscillator(), g = AC.createGain();
      o.type = t || "sine"; o.frequency.value = f; g.gain.value = v || 0.05;
      o.connect(g); g.connect(AC.destination);
      var n = AC.currentTime;
      g.gain.exponentialRampToValueAtTime(0.0001, n + (d || 0.12));
      o.start(n); o.stop(n + (d || 0.12));
    } catch (e) {}
  }

  // ---- seeded PRNG (stages are deterministic -> skill, not luck) ----
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }

  // ---- meta progression (persists across runs) ----
  var META_KEY = "orbital_meta_v1";
  function metaLoad() {
    try {
      var m = JSON.parse(window.localStorage.getItem(META_KEY));
      if (m && typeof m === "object")
        return { stars: m.stars | 0, best: m.best | 0, asc: m.asc | 0 };
    } catch (e) {}
    return { stars: 0, best: 0, asc: 0 };
  }
  function metaSave(m) {
    try { window.localStorage.setItem(META_KEY, JSON.stringify(m)); } catch (e) {}
  }
  function ascFromStars(s) {
    var a = 0, need = 9, acc = 0;
    while (s >= acc + need) { acc += need; a++; need += 6; }
    return a;
  }

  // ---- realms & bosses ----
  var REALMS = [
    { n: "내행성 궤도", c: "#58a6ff", bg: "#060a14", f: "고요한 첫 항로." },
    { n: "소행성대", c: "#f0883e", bg: "#140c06", f: "암석이 길을 막는다." },
    { n: "거성의 그늘", c: "#a371f7", bg: "#0d0814", f: "거대한 중력의 춤." },
    { n: "혜성의 강", c: "#39d353", bg: "#06140b", f: "흐름을 읽어라." },
    { n: "은하 가장자리", c: "#e3b341", bg: "#141006", f: "미지의 끝." }
  ];
  function realmOf(stage) { return REALMS[Math.floor((stage - 1) / 4) % REALMS.length]; }
  var BOSSES = ["타이탄", "에레보스", "헬리오스", "카론", "안드로메다",
    "보이드", "퀘이사", "싱귤러"];
  function bossName(stage) { return BOSSES[(Math.floor(stage / 6) - 1) % BOSSES.length] || "싱귤러"; }
  function isBoss(stage) { return stage % 6 === 0; }
  function isMini(stage) { return stage % 6 !== 0 && stage % 3 === 0; }

  // ---- physics constants (deterministic simulation) ----
  var DT = 1, GK = 0.42, EPS2 = 240, COMET_R = 6;
  var MAXSTEPS = 900, PMIN = 3.0, PMAX = 9.5;

  function bossHits(stage) { return isBoss(stage) ? 3 : 1; }

  // generate a deterministic stage; portal is placed on a REAL trajectory
  // of a known launch -> stage is provably solvable (skill, no luck).
  function genStage(stage) {
    var rnd = mulberry32(0x9E37 + stage * 2654435761);
    var realm = Math.floor((stage - 1) / 4);
    var boss = isBoss(stage), mini = isMini(stage);
    var nWells = Math.min(1 + Math.floor((stage - 1) / 2), 6) + (boss ? 1 : 0);
    var nHaz = Math.min(Math.floor((stage - 1) / 3), 5) + (boss ? 2 : mini ? 1 : 0);
    var start = { x: 70, y: VH / 2 + (rnd() * 2 - 1) * 160 };
    var lvl = { stage: stage, start: start, wells: [], hazards: [],
      portal: null, portalR: Math.max(15, 34 - stage * 0.7) + (boss ? -4 : 0),
      par: Math.max(2, 6 - Math.floor(stage / 4)), boss: boss, mini: mini,
      hits: bossHits(stage), guardian: null, realm: realm };
    var i;
    for (i = 0; i < nWells; i++) {
      lvl.wells.push({
        x: 240 + rnd() * (VW - 420), y: 80 + rnd() * (VH - 160),
        mass: 60 + rnd() * (90 + stage * 6), coreR: 16 + rnd() * 10
      });
    }
    for (i = 0; i < nHaz; i++) {
      lvl.hazards.push({
        x: 260 + rnd() * (VW - 440), y: 70 + rnd() * (VH - 140),
        r: 16 + rnd() * 16
      });
    }
    if (boss) {
      lvl.guardian = { cx: VW * 0.72, cy: VH / 2, R: 120,
        r: 24, omega: 0.013, base: rnd() * 6.28 };
    }
    // find a known-safe launch; place portal on its path -> guaranteed solvable
    var placed = false;
    for (var tryI = 0; tryI < 220 && !placed; tryI++) {
      var ang = (rnd() * 2 - 1) * 1.15;            // aim generally rightward
      var pw = PMIN + rnd() * (PMAX - PMIN);
      var path = simulate(lvl, ang, pw, true);
      if (path.pts.length > 90) {
        var idx = Math.min(path.pts.length - 1,
          120 + Math.floor(rnd() * (path.pts.length - 120)));
        var pt = path.pts[idx];
        if (pt.x > 120 && pt.x < VW - 30 && pt.y > 30 && pt.y < VH - 30 &&
            safeSpot(lvl, pt.x, pt.y, lvl.portalR + 6)) {
          lvl.portal = { x: pt.x, y: pt.y, r: lvl.portalR };
          placed = true;
        }
      }
    }
    if (!placed) {                                   // robust fallback
      lvl.wells = []; lvl.hazards = []; lvl.guardian = null;
      lvl.portal = { x: VW - 140, y: start.y, r: 34 };
    }
    return lvl;
  }
  function safeSpot(lvl, x, y, pad) {
    var i;
    for (i = 0; i < lvl.wells.length; i++)
      if (Math.hypot(x - lvl.wells[i].x, y - lvl.wells[i].y)
          < lvl.wells[i].coreR + pad) return false;
    for (i = 0; i < lvl.hazards.length; i++)
      if (Math.hypot(x - lvl.hazards[i].x, y - lvl.hazards[i].y)
          < lvl.hazards[i].r + pad) return false;
    return true;
  }

  // PURE deterministic simulation. same (lvl,angle,power) -> same result.
  // returns { win, steps, crashed, pts:[{x,y}...] }
  function simulate(lvl, angle, power, wantPath) {
    var x = lvl.start.x, y = lvl.start.y;
    var vx = Math.cos(angle) * power, vy = Math.sin(angle) * power;
    var pts = wantPath ? [{ x: x, y: y }] : null;
    for (var s = 1; s <= MAXSTEPS; s++) {
      var ax = 0, ay = 0, i;
      for (i = 0; i < lvl.wells.length; i++) {
        var wgt = lvl.wells[i];
        var dx = wgt.x - x, dy = wgt.y - y;
        var r2 = dx * dx + dy * dy + EPS2;
        var inv = GK * wgt.mass / (r2 * Math.sqrt(r2));
        ax += dx * inv; ay += dy * inv;
      }
      vx += ax * DT; vy += ay * DT;
      x += vx * DT; y += vy * DT;
      if (wantPath && (s % 3 === 0)) pts.push({ x: x, y: y });

      // portal hit -> win
      if (lvl.portal) {
        var pdx = x - lvl.portal.x, pdy = y - lvl.portal.y;
        if (pdx * pdx + pdy * pdy <=
            (lvl.portal.r + COMET_R) * (lvl.portal.r + COMET_R))
          return { win: true, steps: s, crashed: false, pts: pts };
      }
      // out of bounds
      if (x < -40 || x > VW + 40 || y < -40 || y > VH + 40)
        return { win: false, steps: s, crashed: true, pts: pts };
      // well core
      for (i = 0; i < lvl.wells.length; i++)
        if (Math.hypot(x - lvl.wells[i].x, y - lvl.wells[i].y)
            < lvl.wells[i].coreR + COMET_R)
          return { win: false, steps: s, crashed: true, pts: pts };
      // static hazards
      for (i = 0; i < lvl.hazards.length; i++)
        if (Math.hypot(x - lvl.hazards[i].x, y - lvl.hazards[i].y)
            < lvl.hazards[i].r + COMET_R)
          return { win: false, steps: s, crashed: true, pts: pts };
      // boss guardian (deterministic position by step count)
      if (lvl.guardian) {
        var g = lvl.guardian, ga = g.base + s * g.omega;
        var gx = g.cx + Math.cos(ga) * g.R, gy = g.cy + Math.sin(ga) * g.R;
        if (Math.hypot(x - gx, y - gy) < g.r + COMET_R)
          return { win: false, steps: s, crashed: true, pts: pts };
      }
    }
    return { win: false, steps: MAXSTEPS, crashed: false, pts: pts };
  }

  // ---- game state ----
  var G = {
    screen: "start",
    stage: 1, level: null, realm: REALMS[0],
    score: 0, stars: 0, runStars: 0,
    shots: 0, shotsMax: 0, hitsLeft: 1,
    aiming: false, angle: 0, power: 6, previewLen: 60,
    comet: null, parts: [], shotStars: 3,
    meta: { stars: 0, best: 0, asc: 0 }, startAsc: 0,
    shake: 0, flash: 0, overAt: 0, banner: "", bsub: "", bannerT: 0,
    pendingUpg: null, extraShots: 0, powerStep: 1
  };

  function showBanner(a, b) { G.banner = a; G.bsub = b || ""; G.bannerT = 110; }

  function loadStage(stage) {
    G.stage = stage;
    G.level = genStage(stage);
    G.realm = REALMS[G.level.realm % REALMS.length];
    G.hitsLeft = G.level.hits;
    G.shotsMax = G.level.par + 3 + G.extraShots;
    G.shots = G.shotsMax;
    G.shotStars = 3;
    G.comet = null; G.aiming = false;
    G.angle = 0; G.power = (PMIN + PMAX) / 2;
    if (G.level.boss) showBanner("👑 " + bossName(stage),
      "보스 — " + G.level.hits + "회 명중");
    else if (G.level.mini) showBanner("⚔ 정밀 구간", G.realm.f);
    else if (stage === 1 || (stage - 1) % 4 === 0)
      showBanner("◆ " + G.realm.n, G.realm.f);
    paintHud();
  }

  function startGame() {
    G.meta = metaLoad(); G.startAsc = G.meta.asc;
    G.extraShots = Math.floor(G.startAsc);
    G.previewLen = 60 + G.startAsc * 12;
    G.powerStep = 1;
    G.screen = "playing";
    G.score = 0; G.stars = 0; G.runStars = 0;
    G.parts = []; G.shake = 0; G.flash = 0;
    G.banner = ""; G.bannerT = 0; G.pendingUpg = null;
    loadStage(1);
    hud.classList.remove("hidden");
    startScreen.classList.add("hidden");
    upgScreen.classList.add("hidden");
    overScreen.classList.add("hidden");
  }

  function paintHud() {
    scoreEl.textContent = G.score;
    var t = G.level && G.level.boss ? "👑 " + bossName(G.stage) :
      G.level && G.level.mini ? "⚔ MINI" : "STAGE";
    metaEl.textContent = (G.realm ? G.realm.n + "  ·  " : "") + t + " " +
      G.stage + "  ·  ★" + G.stars +
      (G.hitsLeft > 1 ? "  ·  명중 " + (G.level.hits - G.hitsLeft) +
        "/" + G.level.hits : "");
    shotsEl.textContent = "발사 " + G.shots + "/" + G.shotsMax;
  }

  var POOL = [
    { k: "shot", t: "여분 연료", d: "스테이지 발사 +2", cost: 4,
      ap: function () { G.extraShots += 2; } },
    { k: "prev", t: "긴 예측선", d: "예측 경로 +40", cost: 3,
      ap: function () { G.previewLen += 40; } },
    { k: "fine", t: "정밀 조준", d: "세기 미세조정", cost: 3,
      ap: function () { G.powerStep = 0.5; } },
    { k: "sco", t: "광휘", d: "점수 +30%", cost: 4,
      ap: function () { G.scoreMul = (G.scoreMul || 1) * 1.3; } },
    { k: "star", t: "별 자력", d: "클리어 별 +1", cost: 6,
      ap: function () { G.bonusStar = (G.bonusStar || 0) + 1; } },
    { k: "soft", t: "완충 코어", d: "첫 충돌 1회 무효", cost: 5,
      ap: function () { G.softCore = (G.softCore || 0) + 1; } },
    { k: "pull", t: "약한 중력", d: "다음 영역 난이도 완화", cost: 4,
      ap: function () { G.ease = (G.ease || 0) + 1; } },
    { k: "warp", t: "재정렬", d: "발사 +1 · 예측 +20", cost: 3,
      ap: function () { G.extraShots += 1; G.previewLen += 20; } }
  ];
  function rollOffers() {
    var bag = POOL.slice(), out = [];
    for (var i = 0; i < 3 && bag.length; i++)
      out.push(bag.splice(Math.floor(Math.random() * bag.length), 1)[0]);
    return out;
  }
  function openUpgrades() {
    G.screen = "upgrade";
    upgTitle.textContent = "STAGE " + G.stage + " 클리어 — 강화  (★ " +
      G.stars + ")";
    upgCards.innerHTML = "";
    rollOffers().forEach(function (u) {
      var c = document.createElement("div");
      c.className = "upg";
      c.innerHTML = "<b>" + u.t + "</b><br><span>" + u.d +
        "</span><br><span>비용 ★" + u.cost + "</span>";
      c.onclick = function () {
        if (G.stars < u.cost) return;
        G.stars -= u.cost; u.ap(); beep(660, 0.1, "square", 0.05);
        resumeFromUpgrade();
      };
      upgCards.appendChild(c);
    });
    var sk = document.createElement("div");
    sk.className = "upg";
    sk.innerHTML = "<b>건너뛰기</b><br><span>별 보존</span>";
    sk.onclick = resumeFromUpgrade;
    upgCards.appendChild(sk);
    hud.classList.add("hidden");
    upgScreen.classList.remove("hidden");
  }
  function resumeFromUpgrade() {
    upgScreen.classList.add("hidden");
    hud.classList.remove("hidden");
    G.screen = "playing";
    loadStage(G.stage + 1);
  }

  function addParts(x, y, c, n) {
    for (var i = 0; i < n; i++) {
      var a = Math.random() * 6.283, s = 1 + Math.random() * 4;
      G.parts.push({ x: x, y: y, vx: Math.cos(a) * s, vy: Math.sin(a) * s,
        life: 1, c: c });
    }
  }

  function clearStage() {
    var earned = G.shotStars + (G.bonusStar || 0);
    G.stars += earned; G.runStars += earned;
    G.score += Math.round((100 + earned * 50) * (G.scoreMul || 1));
    addParts(sx(G.level.portal.x), sy(G.level.portal.y), "#39d353", 60);
    G.flash = 0.8; G.shake = Math.max(G.shake, 14);
    beep(720, 0.35, "triangle", 0.07);
    showBanner("CLEAR  ★" + earned, "");
    G.pendingUpg = true;
  }

  function gameOver() {
    G.screen = "over"; G.overAt = Date.now();
    G.shake = 24; G.flash = 1;
    beep(90, 0.5, "sawtooth", 0.07);
    var m = G.meta;
    m.stars += G.runStars;
    var nb = G.score > m.best; if (nb) m.best = G.score;
    var prev = m.asc; m.asc = ascFromStars(m.stars);
    metaSave(m);
    setTimeout(function () {
      if (G.screen !== "over") return;
      finalScore.textContent = G.score;
      bestMsg.textContent = (nb ? "🎉 신기록!  " : "BEST " + m.best + "  ") +
        "· STAGE " + G.stage + " · " + G.realm.n;
      ascGain.textContent = m.asc > prev ?
        "✦ 승천 " + prev + " → " + m.asc + " (다음 항해가 강해집니다)" :
        "✦ 누적 별 " + m.stars + " · 승천 " + m.asc;
      hud.classList.add("hidden");
      overScreen.classList.remove("hidden");
    }, 680);
  }

  function fireComet() {
    if (G.comet || G.shots <= 0) return;
    G.shots--;
    G.comet = { x: G.level.start.x, y: G.level.start.y,
      vx: Math.cos(G.angle) * G.power, vy: Math.sin(G.angle) * G.power,
      step: 0, trail: [] };
    beep(300, 0.12, "sine", 0.05);
    paintHud();
  }

  function endShot(win) {
    G.comet = null;
    if (win) {
      G.hitsLeft--;
      addParts(sx(G.level.portal.x), sy(G.level.portal.y), "#58a6ff", 22);
      beep(560, 0.12, "sine", 0.05);
      if (G.hitsLeft <= 0) { clearStage(); return; }
      showBanner("명중! 남은 " + G.hitsLeft, "");
    } else {
      if ((G.softCore || 0) > 0 && G.shots >= 0) {
        G.softCore--; showBanner("완충 코어", "충돌 무효 — 다시 조준");
      } else {
        G.shotStars = Math.max(1, G.shotStars - 1);
      }
      G.shake = Math.max(G.shake, 8); beep(160, 0.18, "sawtooth", 0.05);
      if (G.shots <= 0) { gameOver(); return; }
    }
    paintHud();
  }

  function handleTap() {
    if (G.screen === "start") startGame();
    else if (G.screen === "over") { if (Date.now() - G.overAt > 700) startGame(); }
  }

  window.addEventListener("pointerdown", function (e) {
    if (e.target && e.target.classList &&
        (e.target.classList.contains("home") ||
         e.target.classList.contains("upg"))) return;
    e.preventDefault();
    if (G.screen !== "playing") { handleTap(); return; }
    if (G.comet) return;
    G.aiming = true; aimTo(e.clientX, e.clientY);
  }, { passive: false });
  window.addEventListener("pointermove", function (e) {
    if (G.screen === "playing" && G.aiming && !G.comet)
      aimTo(e.clientX, e.clientY);
  });
  window.addEventListener("pointerup", function () {
    if (G.screen === "playing" && G.aiming && !G.comet) {
      G.aiming = false; fireComet();
    }
  });
  function aimTo(px, py) {
    var dx = wx(px) - G.level.start.x, dy = wy(py) - G.level.start.y;
    G.angle = Math.atan2(dy, dx);
    var d = Math.hypot(dx, dy);
    G.power = Math.max(PMIN, Math.min(PMAX, PMIN + d / 90 * (PMAX - PMIN)));
  }
  window.addEventListener("keydown", function (e) {
    if (G.screen !== "playing") {
      if (e.code === "Space" || e.code === "Enter") { e.preventDefault(); handleTap(); }
      return;
    }
    if (G.comet) return;
    var st = G.powerStep || 1;
    if (e.code === "ArrowLeft") G.angle -= 0.035;
    else if (e.code === "ArrowRight") G.angle += 0.035;
    else if (e.code === "ArrowUp") G.power = Math.min(PMAX, G.power + 0.15 * st);
    else if (e.code === "ArrowDown") G.power = Math.max(PMIN, G.power - 0.15 * st);
    else if (e.code === "Space") { e.preventDefault(); fireComet(); }
  });

  function update() {
    if (G.screen === "playing" && G.comet) {
      var lvl = G.level, cm = G.comet;
      for (var sub = 0; sub < 2; sub++) {       // 2 physics steps / frame
        cm.step++;
        var ax = 0, ay = 0, i;
        for (i = 0; i < lvl.wells.length; i++) {
          var wg = lvl.wells[i];
          var dx = wg.x - cm.x, dy = wg.y - cm.y;
          var r2 = dx * dx + dy * dy + EPS2;
          var inv = GK * wg.mass / (r2 * Math.sqrt(r2));
          ax += dx * inv; ay += dy * inv;
        }
        cm.vx += ax * DT; cm.vy += ay * DT;
        cm.x += cm.vx * DT; cm.y += cm.vy * DT;
        if (cm.step % 3 === 0) {
          cm.trail.push({ x: cm.x, y: cm.y });
          if (cm.trail.length > 90) cm.trail.shift();
        }
        var pdx = cm.x - lvl.portal.x, pdy = cm.y - lvl.portal.y;
        if (pdx * pdx + pdy * pdy <=
            (lvl.portal.r + COMET_R) * (lvl.portal.r + COMET_R)) {
          endShot(true); return;
        }
        if (cm.x < -40 || cm.x > VW + 40 || cm.y < -40 || cm.y > VH + 40) {
          endShot(false); return;
        }
        for (i = 0; i < lvl.wells.length; i++)
          if (Math.hypot(cm.x - lvl.wells[i].x, cm.y - lvl.wells[i].y)
              < lvl.wells[i].coreR + COMET_R) { endShot(false); return; }
        for (i = 0; i < lvl.hazards.length; i++)
          if (Math.hypot(cm.x - lvl.hazards[i].x, cm.y - lvl.hazards[i].y)
              < lvl.hazards[i].r + COMET_R) { endShot(false); return; }
        if (lvl.guardian) {
          var gd = lvl.guardian, ga = gd.base + cm.step * gd.omega;
          var gx = gd.cx + Math.cos(ga) * gd.R, gy = gd.cy + Math.sin(ga) * gd.R;
          if (Math.hypot(cm.x - gx, cm.y - gy) < gd.r + COMET_R) {
            endShot(false); return;
          }
        }
        if (cm.step >= MAXSTEPS) { endShot(false); return; }
      }
    }
    if (G.pendingUpg && G.screen === "playing") { G.pendingUpg = null; openUpgrades(); }
    var pk = [];
    for (var q = 0; q < G.parts.length; q++) {
      var p = G.parts[q];
      p.x += p.vx; p.y += p.vy; p.vx *= 0.95; p.vy *= 0.95; p.life -= 0.024;
      if (p.life > 0) pk.push(p);
    }
    G.parts = pk;
    if (G.bannerT > 0) G.bannerT--;
    if (G.shake > 0.4) G.shake *= 0.86; else G.shake = 0;
    if (G.flash > 0.01) G.flash *= 0.86; else G.flash = 0;
  }

  function drawCirc(x, y, r, fill) {
    ctx.beginPath(); ctx.arc(x, y, r, 0, 6.2832);
    if (fill) ctx.fill(); else ctx.stroke();
  }
  function draw() {
    var rm = G.realm || REALMS[0];
    var gd = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2,
      Math.max(W, H) * 0.7);
    gd.addColorStop(0, rm.bg); gd.addColorStop(1, "#05060c");
    ctx.fillStyle = gd; ctx.fillRect(0, 0, W, H);
    if (G.flash > 0.02) {
      ctx.fillStyle = "rgba(255,255,255," + (G.flash * 0.4) + ")";
      ctx.fillRect(0, 0, W, H);
    }
    ctx.save();
    if (G.shake > 0.4)
      ctx.translate((Math.random() - .5) * G.shake * 0.5,
                    (Math.random() - .5) * G.shake * 0.5);

    if (G.level && (G.screen === "playing" || G.screen === "upgrade" ||
        G.screen === "over")) {
      var L = G.level, i;
      // arena frame
      ctx.strokeStyle = "rgba(154,164,178,0.16)"; ctx.lineWidth = 2;
      ctx.strokeRect(sx(0), sy(0), VW * VIEW.s, VH * VIEW.s);
      // wells
      for (i = 0; i < L.wells.length; i++) {
        var wg = L.wells[i];
        ctx.strokeStyle = "rgba(88,166,255,0.30)"; ctx.lineWidth = 1.5;
        drawCirc(sx(wg.x), sy(wg.y), (wg.coreR + 26) * VIEW.s, false);
        ctx.fillStyle = rm.c;
        drawCirc(sx(wg.x), sy(wg.y), wg.coreR * VIEW.s, true);
      }
      // hazards
      ctx.fillStyle = "#ff5d5d";
      for (i = 0; i < L.hazards.length; i++)
        drawCirc(sx(L.hazards[i].x), sy(L.hazards[i].y),
          L.hazards[i].r * VIEW.s, true);
      // guardian
      if (L.guardian) {
        var st = G.comet ? G.comet.step : 0;
        var ga = L.guardian.base + st * L.guardian.omega;
        ctx.fillStyle = "#e3b341";
        drawCirc(sx(L.guardian.cx + Math.cos(ga) * L.guardian.R),
          sy(L.guardian.cy + Math.sin(ga) * L.guardian.R),
          L.guardian.r * VIEW.s, true);
      }
      // portal
      ctx.strokeStyle = "#39d353"; ctx.lineWidth = 3;
      drawCirc(sx(L.portal.x), sy(L.portal.y), L.portal.r * VIEW.s, false);
      ctx.fillStyle = "rgba(57,211,83,0.18)";
      drawCirc(sx(L.portal.x), sy(L.portal.y), L.portal.r * VIEW.s, true);
      // start pad
      ctx.fillStyle = "#fff";
      drawCirc(sx(L.start.x), sy(L.start.y), 7 * VIEW.s, true);

      // aim preview (telegraph -> plan with skill, not guess)
      if (!G.comet && G.screen === "playing") {
        var pv = simulate(L, G.angle, G.power, true);
        ctx.fillStyle = "rgba(255,255,255,0.5)";
        var lim = Math.min(pv.pts.length, Math.floor(G.previewLen / 3));
        for (i = 1; i < lim; i++)
          drawCirc(sx(pv.pts[i].x), sy(pv.pts[i].y), 2, true);
        var ex = L.start.x + Math.cos(G.angle) * 34;
        var ey = L.start.y + Math.sin(G.angle) * 34;
        ctx.strokeStyle = rm.c; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(sx(L.start.x), sy(L.start.y));
        ctx.lineTo(sx(ex), sy(ey)); ctx.stroke();
      }
      // comet + trail
      if (G.comet) {
        ctx.strokeStyle = "rgba(88,166,255,0.5)"; ctx.lineWidth = 2;
        ctx.beginPath();
        for (i = 0; i < G.comet.trail.length; i++) {
          var tp = G.comet.trail[i];
          if (i === 0) ctx.moveTo(sx(tp.x), sy(tp.y));
          else ctx.lineTo(sx(tp.x), sy(tp.y));
        }
        ctx.stroke();
        ctx.fillStyle = "#fff";
        ctx.shadowColor = "#58a6ff"; ctx.shadowBlur = 14;
        drawCirc(sx(G.comet.x), sy(G.comet.y), COMET_R * VIEW.s, true);
        ctx.shadowBlur = 0;
      }
      if (G.bannerT > 0) {
        ctx.globalAlpha = Math.min(1, G.bannerT / 30);
        ctx.fillStyle = "#fff"; ctx.textAlign = "center";
        ctx.font = "800 32px Segoe UI, sans-serif";
        ctx.fillText(G.banner, W / 2, H * 0.26);
        ctx.font = "500 15px Segoe UI, sans-serif";
        ctx.fillStyle = "#9aa4b2";
        ctx.fillText(G.bsub, W / 2, H * 0.26 + 26);
        ctx.globalAlpha = 1;
      }
    }
    for (var q = 0; q < G.parts.length; q++) {
      var p = G.parts[q];
      ctx.globalAlpha = p.life > 0 ? p.life : 0;
      drawCirc(p.x, p.y, 3 * p.life + 1, true);
      ctx.fillStyle = p.c;
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  function loop() { update(); draw(); window.requestAnimationFrame(loop); }

  (function () {
    var m = metaLoad();
    ascLine.textContent = m.asc > 0 ?
      "✦ 승천 " + m.asc + " — 추가 연료·긴 예측선으로 출발" :
      "✦ 모은 별은 사라지지 않고 다음 항해로 이어집니다";
  })();

  window.__ORBITAL__ = {
    G: G, update: update, startGame: startGame, handleTap: handleTap,
    resumeUpgrade: resumeFromUpgrade, loadStage: loadStage,
    genStage: genStage, simulate: simulate, fire: fireComet,
    realmOf: realmOf, bossName: bossName, isBoss: isBoss, isMini: isMini,
    ascFromStars: ascFromStars, metaLoad: metaLoad, metaSave: metaSave,
    rollOffers: rollOffers, POOL: POOL,
    consts: { VW: VW, VH: VH, PMIN: PMIN, PMAX: PMAX, MAXSTEPS: MAXSTEPS,
      COMET_R: COMET_R }
  };

  loop();
})();
</script>
</body>
</html>
